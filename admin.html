<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>لوحة الإدارة - Elite Capital</title>
    
    <!-- Font Awesome 6 -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    
    <!-- Google Fonts -->
    <link href="https://fonts.googleapis.com/css2?family=Tajawal:wght@300;400;500;700;900&display=swap" rel="stylesheet">
    
    <!-- Supabase -->
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script src="supabase.js"></script>

    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        :root {
            --primary: #c8a97e;
            --primary-dark: #b38b5b;
            --primary-light: #dac09a;
            --secondary: #2c3e50;
            --success: #27ae60;
            --warning: #f39c12;
            --danger: #e74c3c;
            --dark: #0f172a;
            --dark-light: #1e293b;
            --text: #ffffff;
            --text-muted: rgba(255, 255, 255, 0.7);
            --gold: #c8a97e;
            --shadow: 0 20px 40px rgba(0, 0, 0, 0.3);
            --shadow-gold: 0 10px 30px rgba(200, 169, 126, 0.3);
            --gradient-gold: linear-gradient(135deg, #c8a97e, #b38b5b);
        }

        body {
            font-family: 'Tajawal', sans-serif;
            background: var(--dark);
            color: var(--text);
            overflow-x: hidden;
            min-height: 100vh;
        }

        /* شريط التمرير */
        ::-webkit-scrollbar {
            width: 8px;
        }

        ::-webkit-scrollbar-track {
            background: rgba(255, 255, 255, 0.05);
        }

        ::-webkit-scrollbar-thumb {
            background: var(--gold);
            border-radius: 4px;
        }

        /* الحاوية الرئيسية */
        .admin-container {
            display: flex;
            min-height: 100vh;
        }

        /* الشريط الجانبي */
        .sidebar {
            width: 280px;
            background: rgba(15, 23, 42, 0.98);
            backdrop-filter: blur(10px);
            border-left: 3px solid var(--gold);
            padding: 25px;
            position: fixed;
            height: 100vh;
            overflow-y: auto;
            box-shadow: 5px 0 20px rgba(0, 0, 0, 0.3);
        }

        .sidebar-header {
            text-align: center;
            padding: 20px 0;
            margin-bottom: 30px;
            border-bottom: 2px solid rgba(200, 169, 126, 0.3);
        }

        .sidebar-header h2 {
            color: var(--gold);
            font-size: 24px;
            margin-bottom: 5px;
        }

        .sidebar-header p {
            color: var(--text-muted);
            font-size: 12px;
        }

        .sidebar-menu {
            list-style: none;
        }

        .sidebar-menu li {
            margin-bottom: 10px;
            position: relative;
        }

        .sidebar-menu a {
            display: flex;
            align-items: center;
            gap: 15px;
            padding: 15px 20px;
            color: var(--text-muted);
            text-decoration: none;
            border-radius: 15px;
            transition: all 0.3s;
            border: 1px solid transparent;
            cursor: pointer;
        }

        .sidebar-menu a:hover,
        .sidebar-menu a.active {
            background: rgba(200, 169, 126, 0.1);
            color: var(--gold);
            border-color: var(--gold);
        }

        .sidebar-menu i {
            width: 25px;
            font-size: 18px;
        }

        .sidebar-menu .badge {
            background: var(--danger);
            color: white;
            padding: 3px 8px;
            border-radius: 10px;
            font-size: 11px;
            margin-right: auto;
            animation: pulse 2s infinite;
        }

        @keyframes pulse {
            0% { transform: scale(1); }
            50% { transform: scale(1.1); }
            100% { transform: scale(1); }
        }

        /* المحتوى الرئيسي */
        .main-content {
            flex: 1;
            margin-right: 280px;
            padding: 25px;
        }

        /* الشريط العلوي للوحة */
        .admin-header {
            background: rgba(30, 41, 59, 0.5);
            backdrop-filter: blur(10px);
            border-radius: 25px;
            padding: 20px 25px;
            margin-bottom: 30px;
            border: 1px solid rgba(200, 169, 126, 0.3);
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .admin-header h2 {
            color: var(--gold);
            font-size: 24px;
        }

        .admin-header .date {
            color: var(--text-muted);
            font-size: 14px;
        }

        .admin-header-left {
            display: flex;
            align-items: center;
            gap: 20px;
        }

        /* قائمة المستخدم */
        .user-menu {
            position: relative;
        }

        .user-avatar {
            width: 45px;
            height: 45px;
            background: var(--gradient-gold);
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 20px;
            font-weight: bold;
            color: var(--dark);
            cursor: pointer;
            border: 2px solid var(--gold);
        }

        .user-dropdown {
            position: absolute;
            top: 60px;
            left: 0;
            width: 250px;
            background: var(--dark-light);
            border-radius: 20px;
            padding: 15px;
            border: 2px solid var(--gold);
            display: none;
            box-shadow: var(--shadow);
            z-index: 1001;
        }

        .user-dropdown.active {
            display: block;
            animation: slideDown 0.3s;
        }

        @keyframes slideDown {
            from {
                opacity: 0;
                transform: translateY(-10px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        .user-dropdown-item {
            display: flex;
            align-items: center;
            gap: 12px;
            padding: 12px 15px;
            color: var(--text);
            border-radius: 12px;
            transition: all 0.3s;
            cursor: pointer;
            position: relative;
        }

        .user-dropdown-item:hover {
            background: rgba(200, 169, 126, 0.1);
            color: var(--gold);
        }

        /* ===== قسم الدردشة المباشرة ===== */
        .chat-filters {
            display: flex;
            gap: 10px;
            margin-bottom: 20px;
            flex-wrap: wrap;
        }

        .filter-btn {
            padding: 10px 20px;
            background: rgba(255, 255, 255, 0.03);
            border: 1px solid rgba(200, 169, 126, 0.3);
            border-radius: 30px;
            color: var(--text-muted);
            cursor: pointer;
            transition: all 0.3s;
        }

        .filter-btn.active {
            background: var(--gold);
            color: var(--dark);
            border-color: var(--gold);
        }

        .filter-btn:hover {
            border-color: var(--gold);
        }

        .chats-list {
            max-height: 600px;
            overflow-y: auto;
            padding-left: 10px;
        }

        .chat-item {
            background: rgba(255, 255, 255, 0.03);
            border-radius: 15px;
            padding: 20px;
            margin-bottom: 15px;
            display: flex;
            align-items: center;
            gap: 15px;
            transition: all 0.3s;
            border-right: 4px solid var(--success);
            position: relative;
            cursor: pointer;
        }

        .chat-item:hover {
            background: rgba(200, 169, 126, 0.1);
            transform: translateX(-5px);
        }

        .chat-item.unread {
            border-right-color: var(--danger);
            background: rgba(231, 76, 60, 0.05);
        }

        .chat-avatar {
            width: 60px;
            height: 60px;
            background: var(--gradient-gold);
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 24px;
            font-weight: bold;
            color: var(--dark);
            flex-shrink: 0;
            pointer-events: none; /* مهم: منع تداخل الأحداث */
        }

        .chat-info {
            flex: 1;
            pointer-events: none; /* مهم: منع تداخل الأحداث */
        }

        .chat-info h4 {
            font-size: 18px;
            margin-bottom: 5px;
            color: var(--gold);
        }

        .chat-info p {
            font-size: 14px;
            color: var(--text-muted);
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
            max-width: 300px;
        }

        .chat-time {
            font-size: 12px;
            color: var(--text-muted);
            min-width: 80px;
            text-align: left;
            pointer-events: none; /* مهم: منع تداخل الأحداث */
        }

        .chat-unread-badge {
            background: var(--danger);
            color: white;
            font-size: 12px;
            padding: 4px 8px;
            border-radius: 50px;
            min-width: 25px;
            text-align: center;
        }

        .chat-delete-btn {
            background: rgba(231, 76, 60, 0.2);
            color: var(--danger);
            border: 1px solid var(--danger);
            padding: 8px 15px;
            border-radius: 30px;
            font-size: 12px;
            cursor: pointer;
            transition: all 0.3s;
            z-index: 10;
            position: relative;
        }

        .chat-delete-btn:hover {
            background: var(--danger);
            color: white;
        }

        /* نافذة الدردشة */
        .chat-modal {
            position: fixed;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background: rgba(0, 0, 0, 0.95);
            backdrop-filter: blur(10px);
            z-index: 2000;
            display: none;
            align-items: center;
            justify-content: center;
            padding: 20px;
        }

        .chat-modal.active {
            display: flex;
        }

        .chat-modal-content {
            background: linear-gradient(135deg, #1e293b, #0f172a);
            border-radius: 30px;
            width: 100%;
            max-width: 800px;
            height: 80vh;
            display: flex;
            flex-direction: column;
            border: 2px solid var(--gold);
        }

        .chat-modal-header {
            padding: 20px;
            border-bottom: 2px solid var(--gold);
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .chat-modal-header h3 {
            color: var(--gold);
            font-size: 20px;
        }

        .chat-modal-close {
            background: none;
            border: none;
            color: var(--text-muted);
            font-size: 28px;
            cursor: pointer;
        }

        .chat-modal-close:hover {
            color: var(--danger);
        }

        .chat-messages {
            flex: 1;
            overflow-y: auto;
            padding: 20px;
            display: flex;
            flex-direction: column;
            gap: 15px;
        }

        .message-wrapper {
            display: flex;
            flex-direction: column;
            max-width: 80%;
        }

        .message-wrapper.user {
            align-self: flex-start;
        }

        .message-wrapper.admin {
            align-self: flex-end;
        }

        .message-bubble {
            padding: 12px 18px;
            border-radius: 20px;
            word-wrap: break-word;
        }

        .message-wrapper.user .message-bubble {
            background: rgba(255, 255, 255, 0.1);
            border-bottom-right-radius: 5px;
        }

        .message-wrapper.admin .message-bubble {
            background: var(--gold);
            color: var(--dark);
            border-bottom-left-radius: 5px;
        }

        .message-image {
            max-width: 200px;
            max-height: 200px;
            border-radius: 10px;
            margin-bottom: 5px;
            cursor: pointer;
        }

        .message-info {
            display: flex;
            align-items: center;
            gap: 10px;
            font-size: 11px;
            color: var(--text-muted);
            margin-top: 5px;
        }

        .message-wrapper.admin .message-info {
            justify-content: flex-end;
        }

        .delete-message-btn {
            background: none;
            border: none;
            color: rgba(255, 255, 255, 0.3);
            font-size: 12px;
            cursor: pointer;
        }

        .delete-message-btn:hover {
            color: var(--danger);
        }

        .chat-input-area {
            padding: 20px;
            border-top: 2px solid var(--gold);
            display: flex;
            gap: 10px;
        }

        .chat-input-area input {
            flex: 1;
            padding: 15px 20px;
            background: rgba(255, 255, 255, 0.05);
            border: 2px solid rgba(200, 169, 126, 0.3);
            border-radius: 30px;
            color: white;
            font-size: 16px;
        }

        .chat-input-area input:focus {
            outline: none;
            border-color: var(--gold);
        }

        .chat-send-btn {
            width: 60px;
            height: 60px;
            background: var(--gold);
            border: none;
            border-radius: 50%;
            color: var(--dark);
            font-size: 24px;
            cursor: pointer;
        }

        /* نافذة تأكيد الحذف */
        .confirm-modal {
            position: fixed;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background: rgba(0, 0, 0, 0.95);
            z-index: 3000;
            display: none;
            align-items: center;
            justify-content: center;
            padding: 20px;
        }

        .confirm-modal.active {
            display: flex;
        }

        .confirm-content {
            background: linear-gradient(135deg, #1e293b, #0f172a);
            border-radius: 30px;
            padding: 40px;
            max-width: 500px;
            width: 100%;
            border: 2px solid var(--danger);
            text-align: center;
        }

        .confirm-icon {
            width: 80px;
            height: 80px;
            background: var(--danger);
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 40px;
            color: white;
            margin: 0 auto 20px;
        }

        .confirm-title {
            font-size: 24px;
            font-weight: 900;
            color: var(--danger);
            margin-bottom: 15px;
        }

        .confirm-message {
            color: var(--text-muted);
            margin-bottom: 30px;
        }

        .confirm-buttons {
            display: flex;
            gap: 15px;
        }

        .confirm-btn {
            flex: 1;
            padding: 15px;
            border: none;
            border-radius: 30px;
            font-weight: 700;
            cursor: pointer;
        }

        .confirm-btn.cancel {
            background: transparent;
            border: 2px solid var(--gold);
            color: var(--text);
        }

        .confirm-btn.delete {
            background: var(--danger);
            color: white;
        }

        /* نافذة عرض الصورة */
        .image-viewer {
            position: fixed;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background: rgba(0, 0, 0, 0.98);
            z-index: 4000;
            display: none;
            align-items: center;
            justify-content: center;
            padding: 20px;
        }

        .image-viewer.active {
            display: flex;
        }

        .image-viewer img {
            max-width: 90%;
            max-height: 90vh;
            border-radius: 20px;
            border: 3px solid var(--gold);
        }

        .image-viewer-close {
            position: absolute;
            top: 20px;
            right: 20px;
            width: 50px;
            height: 50px;
            background: var(--danger);
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            color: white;
            font-size: 24px;
            cursor: pointer;
        }

        /* الإشعارات */
        .notification {
            position: fixed;
            top: 100px;
            right: 20px;
            background: var(--success);
            color: white;
            padding: 15px 25px;
            border-radius: 50px;
            display: none;
            z-index: 5000;
            border-right: 4px solid white;
            min-width: 300px;
        }

        .notification.error {
            background: var(--danger);
        }

        /* أقسام الصفحات */
        .section {
            display: none;
        }

        .section.active {
            display: block;
        }

        @media (max-width: 768px) {
            .sidebar {
                width: 80px;
                padding: 15px;
            }
            
            .sidebar-header h2,
            .sidebar-menu a span {
                display: none;
            }
            
            .main-content {
                margin-right: 80px;
            }
        }
    </style>
</head>
<body>
    <!-- نافذة عرض الصورة -->
    <div class="image-viewer" id="imageViewer" onclick="closeImageViewer()">
        <img id="viewerImage" src="" alt="">
        <div class="image-viewer-close" onclick="closeImageViewer()">&times;</div>
    </div>

    <!-- نافذة تأكيد حذف الدردشة -->
    <div class="confirm-modal" id="deleteChatModal">
        <div class="confirm-content">
            <div class="confirm-icon">
                <i class="fas fa-trash"></i>
            </div>
            <h3 class="confirm-title">حذف المحادثة</h3>
            <p class="confirm-message" id="deleteChatMessage">هل أنت متأكد من حذف هذه المحادثة؟</p>
            <div class="confirm-buttons">
                <button class="confirm-btn cancel" onclick="closeDeleteChatModal()">إلغاء</button>
                <button class="confirm-btn delete" onclick="confirmDeleteChat()">حذف</button>
            </div>
        </div>
    </div>

    <!-- نافذة تأكيد حذف رسالة -->
    <div class="confirm-modal" id="deleteMessageModal">
        <div class="confirm-content">
            <div class="confirm-icon">
                <i class="fas fa-trash"></i>
            </div>
            <h3 class="confirm-title">حذف الرسالة</h3>
            <p class="confirm-message">هل أنت متأكد من حذف هذه الرسالة؟</p>
            <div class="confirm-buttons">
                <button class="confirm-btn cancel" onclick="closeDeleteMessageModal()">إلغاء</button>
                <button class="confirm-btn delete" onclick="confirmDeleteMessage()">حذف</button>
            </div>
        </div>
    </div>

    <div class="admin-container">
        <!-- الشريط الجانبي -->
        <div class="sidebar">
            <div class="sidebar-header">
                <h2>ELITE CAPITAL</h2>
                <p>لوحة الإدارة</p>
            </div>
            
            <ul class="sidebar-menu">
                <li><a class="active" onclick="showSection('livechat')">
                    <i class="fas fa-comments"></i>
                    <span>الدردشة المباشرة</span>
                    <span class="badge" id="chatBadge">0</span>
                </a></li>
                <li><a onclick="logout()">
                    <i class="fas fa-sign-out-alt"></i>
                    <span>خروج</span>
                </a></li>
            </ul>
        </div>
        
        <!-- المحتوى الرئيسي -->
        <div class="main-content">
            <!-- الشريط العلوي -->
            <div class="admin-header">
                <h2 id="pageTitle">الدردشة المباشرة</h2>
                <div class="admin-header-left">
                    <div class="date" id="currentDateTime"></div>
                    <div class="user-menu">
                        <div class="user-avatar" id="userAvatar" onclick="toggleUserMenu()">أ</div>
                        <div class="user-dropdown" id="userDropdown">
                            <div class="user-dropdown-item" onclick="refreshData()">
                                <i class="fas fa-sync-alt"></i>
                                تحديث
                            </div>
                            <div class="user-dropdown-item" onclick="logout()">
                                <i class="fas fa-sign-out-alt"></i>
                                خروج
                            </div>
                        </div>
                    </div>
                </div>
            </div>

            <!-- قسم الدردشة -->
            <div id="livechat-section" class="section active">
                <div class="card" style="background: rgba(30, 41, 59, 0.5); border-radius: 25px; padding: 25px; border: 1px solid rgba(200, 169, 126, 0.3);">
                    <div class="card-header" style="display: flex; justify-content: space-between; align-items: center; margin-bottom: 20px;">
                        <h3 class="card-title" style="font-size: 20px; font-weight: 700; color: var(--gold); display: flex; align-items: center; gap: 10px;">
                            <i class="fas fa-comments"></i>
                            المحادثات النشطة
                        </h3>
                        <div class="chat-filters">
                            <button class="filter-btn active" onclick="filterChats('all')">الكل</button>
                            <button class="filter-btn" onclick="filterChats('unread')">غير مقروءة</button>
                            <button class="filter-btn" onclick="filterChats('active')">نشطة</button>
                        </div>
                    </div>
                    
                    <div class="chats-list" id="chatsContainer">
                        <div style="text-align: center; padding: 40px; color: var(--text-muted);">
                            <i class="fas fa-spinner fa-spin fa-2x"></i>
                            <p>جاري التحميل...</p>
                        </div>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <!-- نافذة الدردشة -->
    <div class="chat-modal" id="chatModal">
        <div class="chat-modal-content">
            <div class="chat-modal-header">
                <h3>محادثة مع <span id="chatUserName"></span></h3>
                <button class="chat-modal-close" onclick="closeChatModal()">&times;</button>
            </div>
            
            <div class="chat-messages" id="chatMessages">
                <!-- الرسائل تظهر هنا -->
            </div>
            
            <div class="chat-input-area">
                <input type="text" id="chatInput" placeholder="اكتب رسالتك هنا..." onkeypress="handleChatKeyPress(event)">
                <button class="chat-send-btn" onclick="sendChatMessage()">
                    <i class="fas fa-paper-plane"></i>
                </button>
            </div>
        </div>
    </div>

    <!-- الإشعارات -->
    <div class="notification" id="notification"></div>

    <script>
        let currentAdmin = null;
        let currentChatId = null;
        let currentMessageId = null;
        let chatInterval = null;
        let allChats = [];
        let currentFilter = 'all';

        // تهيئة الصفحة
        document.addEventListener('DOMContentLoaded', async function() {
            await checkAdminAccess();
            await loadActiveChats();
            updateDateTime();
            setInterval(updateDateTime, 1000);
            setInterval(loadActiveChats, 5000);
        });

        // تحديث الوقت
        function updateDateTime() {
            const now = new Date();
            document.getElementById('currentDateTime').textContent = now.toLocaleString('ar-SA');
        }

        // التحقق من صلاحية المسؤول
        async function checkAdminAccess() {
            const savedUser = localStorage.getItem('current_user');
            if (!savedUser) {
                window.location.href = 'index.html';
                return;
            }
            
            currentAdmin = JSON.parse(savedUser);
            
            if (!currentAdmin.is_admin) {
                window.location.href = 'dashboard.html';
                return;
            }
            
            document.getElementById('userAvatar').textContent = currentAdmin.name?.charAt(0).toUpperCase() || 'أ';
        }

        // تحميل المحادثات النشطة
        async function loadActiveChats() {
            try {
                const { data, error } = await supabaseClient
                    .from('live_chats')
                    .select(`
                        *,
                        users:user_id (
                            id,
                            name,
                            email
                        )
                    `)
                    .eq('status', 'active')
                    .order('last_message_at', { ascending: false });

                if (error) throw error;

                allChats = data || [];
                
                for (let chat of allChats) {
                    // جلب آخر رسالة
                    const { data: messages } = await supabaseClient
                        .from('chat_messages')
                        .select('*')
                        .eq('chat_id', chat.id)
                        .eq('is_deleted', false)
                        .order('created_at', { ascending: false })
                        .limit(1);

                    chat.last_message = messages?.[0];

                    // حساب عدد الرسائل غير المقروءة
                    const { count } = await supabaseClient
                        .from('chat_messages')
                        .select('*', { count: 'exact', head: true })
                        .eq('chat_id', chat.id)
                        .eq('is_read', false)
                        .eq('is_deleted', false)
                        .neq('user_id', currentAdmin.id);

                    chat.unread_count = count || 0;
                }

                const totalUnread = allChats.reduce((sum, chat) => sum + (chat.unread_count || 0), 0);
                document.getElementById('chatBadge').textContent = totalUnread;

                displayChats();
            } catch (error) {
                console.error('خطأ في تحميل المحادثات:', error);
            }
        }

        // عرض المحادثات
        function displayChats() {
            const container = document.getElementById('chatsContainer');
            
            let filteredChats = allChats;
            
            if (currentFilter === 'unread') {
                filteredChats = allChats.filter(chat => chat.unread_count > 0);
            } else if (currentFilter === 'active') {
                filteredChats = allChats.filter(chat => !chat.admin_id);
            }

            if (filteredChats.length === 0) {
                container.innerHTML = `
                    <div style="text-align: center; padding: 40px; color: var(--text-muted);">
                        <i class="fas fa-inbox fa-3x" style="margin-bottom: 15px;"></i>
                        <p>لا توجد محادثات</p>
                    </div>
                `;
                return;
            }

            let html = '';
            filteredChats.forEach(chat => {
                const lastMessage = chat.last_message?.message || 'لا توجد رسائل';
                const timeAgo = getTimeAgo(new Date(chat.last_message_at));
                const isUnread = chat.unread_count > 0;

                html += `
                    <div class="chat-item ${isUnread ? 'unread' : ''}" onclick="openChat(${chat.id}, '${chat.users?.name || 'مستخدم'}', ${chat.user_id})">
                        <div class="chat-avatar">
                            ${(chat.users?.name || 'م').charAt(0).toUpperCase()}
                        </div>
                        <div class="chat-info">
                            <h4>${chat.users?.name || 'مستخدم'} <small style="color: var(--text-muted);">(${chat.users?.email || ''})</small></h4>
                            <p>${lastMessage}</p>
                        </div>
                        <div class="chat-time">
                            <div>${timeAgo}</div>
                            ${isUnread ? `<div class="chat-unread-badge">${chat.unread_count}</div>` : ''}
                        </div>
                        <button class="chat-delete-btn" onclick="event.stopPropagation(); showDeleteChatModal(${chat.id}, '${chat.users?.name || 'مستخدم'}')">
                            <i class="fas fa-trash"></i> حذف
                        </button>
                    </div>
                `;
            });

            container.innerHTML = html;
        }

        // فلترة المحادثات
        function filterChats(filter) {
            currentFilter = filter;
            document.querySelectorAll('.filter-btn').forEach(btn => {
                btn.classList.remove('active');
                if (btn.textContent.includes(filter === 'all' ? 'الكل' : filter === 'unread' ? 'غير مقروءة' : 'نشطة')) {
                    btn.classList.add('active');
                }
            });
            displayChats();
        }

        // حساب الوقت المنقضي
        function getTimeAgo(date) {
            const now = new Date();
            const diff = Math.floor((now - date) / 1000);
            
            if (diff < 60) return 'الآن';
            if (diff < 3600) return `منذ ${Math.floor(diff / 60)} دقيقة`;
            if (diff < 86400) return `منذ ${Math.floor(diff / 3600)} ساعة`;
            return `منذ ${Math.floor(diff / 86400)} يوم`;
        }

        // فتح نافذة تأكيد حذف المحادثة
        function showDeleteChatModal(chatId, userName) {
            event.stopPropagation();
            currentChatId = chatId;
            document.getElementById('deleteChatMessage').textContent = `هل أنت متأكد من حذف محادثة ${userName}؟`;
            document.getElementById('deleteChatModal').classList.add('active');
        }

        function closeDeleteChatModal() {
            document.getElementById('deleteChatModal').classList.remove('active');
            currentChatId = null;
        }

        // تأكيد حذف المحادثة
        async function confirmDeleteChat() {
            if (!currentChatId) return;

            try {
                await supabaseClient
                    .from('chat_messages')
                    .delete()
                    .eq('chat_id', currentChatId);

                await supabaseClient
                    .from('live_chats')
                    .delete()
                    .eq('id', currentChatId);

                showNotification('✅ تم حذف المحادثة بنجاح');
                closeDeleteChatModal();
                await loadActiveChats();

                if (document.getElementById('chatModal').classList.contains('active')) {
                    closeChatModal();
                }
            } catch (error) {
                showNotification('❌ ' + error.message, 'error');
            }
        }

        // فتح الدردشة
        async function openChat(chatId, userName, userId) {
            console.log('فتح الدردشة:', chatId, userName);
            currentChatId = chatId;
            document.getElementById('chatUserName').textContent = userName;
            document.getElementById('chatModal').classList.add('active');
            
            await loadChatMessages();
            
            if (chatInterval) clearInterval(chatInterval);
            chatInterval = setInterval(loadChatMessages, 3000);
        }

        // تحميل رسائل الدردشة
        async function loadChatMessages() {
            if (!currentChatId) return;

            try {
                const { data, error } = await supabaseClient
                    .from('chat_messages')
                    .select(`
                        *,
                        users:user_id (
                            id,
                            name,
                            is_admin
                        )
                    `)
                    .eq('chat_id', currentChatId)
                    .order('created_at', { ascending: true });

                if (error) throw error;

                displayMessages(data || []);
                await markMessagesAsRead();
            } catch (error) {
                console.error('خطأ في تحميل الرسائل:', error);
            }
        }

        // عرض الرسائل
        function displayMessages(messages) {
            const container = document.getElementById('chatMessages');
            
            let html = '';
            let lastDate = null;

            messages.forEach(msg => {
                if (msg.is_deleted) return;

                const isAdmin = msg.users?.is_admin;
                const msgDate = new Date(msg.created_at);
                const dateStr = msgDate.toLocaleDateString('ar-SA');

                if (lastDate !== dateStr) {
                    html += `
                        <div style="text-align: center; margin: 20px 0;">
                            <span style="background: rgba(255,255,255,0.05); padding: 5px 15px; border-radius: 50px; font-size: 12px;">
                                ${dateStr}
                            </span>
                        </div>
                    `;
                    lastDate = dateStr;
                }

                const timeStr = msgDate.toLocaleTimeString('ar-SA', { hour: '2-digit', minute: '2-digit' });
                const senderName = isAdmin ? 'أنت' : msg.users?.name || 'مستخدم';

                let messageContent = '';

                if (msg.image_url) {
                    if (msg.image_url.startsWith('image:')) {
                        const imageId = msg.image_url.replace('image:', '');
                        messageContent += `
                            <img class="message-image" src="/api/chat-image/${imageId}" onclick="showImage(this.src)">
                        `;
                    } else {
                        messageContent += `
                            <img src="${msg.image_url}" class="message-image" onclick="showImage(this.src)">
                        `;
                    }
                }

                if (msg.message) {
                    messageContent += `<div>${msg.message}</div>`;
                }

                html += `
                    <div class="message-wrapper ${isAdmin ? 'admin' : 'user'}">
                        <div class="message-bubble">
                            ${messageContent}
                        </div>
                        <div class="message-info">
                            <span>${senderName}</span>
                            <span>•</span>
                            <span>${timeStr}</span>
                            ${msg.is_read ? '<span>✓✓</span>' : '<span>✓</span>'}
                            <button class="delete-message-btn" onclick="event.stopPropagation(); showDeleteMessageModal(${msg.id})">
                                <i class="fas fa-trash"></i>
                            </button>
                        </div>
                    </div>
                `;
            });

            container.innerHTML = html;
            container.scrollTop = container.scrollHeight;
        }

        // عرض الصورة
        function showImage(src) {
            document.getElementById('viewerImage').src = src;
            document.getElementById('imageViewer').classList.add('active');
        }

        function closeImageViewer() {
            document.getElementById('imageViewer').classList.remove('active');
        }

        // تحديث حالة القراءة
        async function markMessagesAsRead() {
            if (!currentChatId) return;

            await supabaseClient
                .from('chat_messages')
                .update({ 
                    is_read: true,
                    read_at: new Date().toISOString()
                })
                .eq('chat_id', currentChatId)
                .neq('user_id', currentAdmin.id)
                .eq('is_read', false);
        }

        // إرسال رسالة
        async function sendChatMessage() {
            const input = document.getElementById('chatInput');
            const message = input.value.trim();

            if (!message || !currentChatId) return;

            input.value = '';

            try {
                await supabaseClient
                    .from('chat_messages')
                    .insert([{
                        chat_id: currentChatId,
                        user_id: currentAdmin.id,
                        message: message,
                        created_at: new Date().toISOString()
                    }]);

                await supabaseClient
                    .from('live_chats')
                    .update({ last_message_at: new Date().toISOString() })
                    .eq('id', currentChatId);

                await loadChatMessages();
            } catch (error) {
                showNotification('❌ ' + error.message, 'error');
            }
        }

        // إرسال بالضغط على Enter
        function handleChatKeyPress(event) {
            if (event.key === 'Enter') {
                event.preventDefault();
                sendChatMessage();
            }
        }

        // إغلاق نافذة الدردشة
        function closeChatModal() {
            document.getElementById('chatModal').classList.remove('active');
            if (chatInterval) {
                clearInterval(chatInterval);
            }
            currentChatId = null;
        }

        // فتح نافذة تأكيد حذف رسالة
        function showDeleteMessageModal(messageId) {
            event.stopPropagation();
            currentMessageId = messageId;
            document.getElementById('deleteMessageModal').classList.add('active');
        }

        function closeDeleteMessageModal() {
            document.getElementById('deleteMessageModal').classList.remove('active');
            currentMessageId = null;
        }

        async function confirmDeleteMessage() {
            if (!currentMessageId) return;

            try {
                await supabaseClient
                    .from('chat_messages')
                    .update({ 
                        is_deleted: true,
                        deleted_by: currentAdmin.id,
                        deleted_at: new Date().toISOString()
                    })
                    .eq('id', currentMessageId);

                showNotification('✅ تم حذف الرسالة');
                closeDeleteMessageModal();
                await loadChatMessages();
            } catch (error) {
                showNotification('❌ ' + error.message, 'error');
            }
        }

        // دوال مساعدة
        function toggleUserMenu() {
            document.getElementById('userDropdown').classList.toggle('active');
        }

        function refreshData() {
            showNotification('جاري التحديث...', 'info');
            loadActiveChats();
        }

        function showNotification(message, type = 'success') {
            const notification = document.getElementById('notification');
            notification.innerHTML = message;
            notification.className = 'notification ' + type;
            notification.style.display = 'block';
            setTimeout(() => notification.style.display = 'none', 3000);
        }

        function logout() {
            if (confirm('هل تريد تسجيل الخروج؟')) {
                if (chatInterval) clearInterval(chatInterval);
                localStorage.removeItem('current_user');
                window.location.href = 'index.html';
            }
        }

        // إغلاق القوائم عند النقر خارجها
        document.addEventListener('click', function(e) {
            const dropdown = document.getElementById('userDropdown');
            const avatar = document.getElementById('userAvatar');
            if (dropdown && avatar && !avatar.contains(e.target) && !dropdown.contains(e.target)) {
                dropdown.classList.remove('active');
            }
        });

        window.addEventListener('beforeunload', function() {
            if (chatInterval) clearInterval(chatInterval);
        });
    </script>
</body>
</html>
