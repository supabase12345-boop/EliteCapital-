<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>المراهنات - Elite Capital</title>
    
    <!-- منع التخزين المؤقت -->
    <meta http-equiv="Cache-Control" content="no-cache, no-store, must-validate">
    <meta http-equiv="Pragma" content="no-cache">
    <meta http-equiv="Expires" content="0">
    
    <!-- Font Awesome 6 -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    
    <!-- Google Fonts -->
    <link href="https://fonts.googleapis.com/css2?family=Tajawal:wght@300;400;500;700;900&display=swap" rel="stylesheet">
    
    <!-- AOS Animation -->
    <link href="https://unpkg.com/aos@2.3.1/dist/aos.css" rel="stylesheet">
    
    <!-- Supabase -->
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script src="supabase.js"></script>
    
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        :root {
            --primary: #c8a97e;
            --primary-dark: #b38b5b;
            --primary-light: #dac09a;
            --secondary: #2c3e50;
            --success: #27ae60;
            --warning: #f39c12;
            --danger: #e74c3c;
            --dark: #0f172a;
            --dark-light: #1e293b;
            --text: #ffffff;
            --text-muted: rgba(255, 255, 255, 0.7);
            --gold: #c8a97e;
            --shadow: 0 20px 40px rgba(0, 0, 0, 0.3);
            --shadow-gold: 0 10px 30px rgba(200, 169, 126, 0.3);
            --gradient-gold: linear-gradient(135deg, #c8a97e, #b38b5b);
        }

        body {
            font-family: 'Tajawal', sans-serif;
            background: var(--dark);
            color: var(--text);
            overflow-x: hidden;
            min-height: 100vh;
            padding-bottom: 100px;
        }

        /* شريط التمرير */
        ::-webkit-scrollbar {
            width: 6px;
            height: 6px;
        }

        ::-webkit-scrollbar-track {
            background: rgba(255, 255, 255, 0.02);
        }

        ::-webkit-scrollbar-thumb {
            background: var(--gold);
            border-radius: 10px;
        }

        /* الشريط العلوي */
        .top-bar {
            position: fixed;
            top: 0;
            left: 0;
            right: 0;
            z-index: 100;
            background: rgba(15, 23, 42, 0.8);
            backdrop-filter: blur(20px);
            -webkit-backdrop-filter: blur(20px);
            border-bottom: 1px solid rgba(200, 169, 126, 0.2);
            padding: 12px 20px;
            display: flex;
            align-items: center;
            justify-content: space-between;
        }

        .back-btn {
            width: 45px;
            height: 45px;
            background: rgba(30, 41, 59, 0.7);
            border: 1px solid rgba(200, 169, 126, 0.2);
            border-radius: 15px;
            display: flex;
            align-items: center;
            justify-content: center;
            color: var(--gold);
            font-size: 22px;
            cursor: pointer;
            transition: all 0.3s;
            text-decoration: none;
        }

        .back-btn:hover {
            background: var(--gold);
            color: var(--dark);
            transform: rotate(90deg);
        }

        .page-title {
            font-size: 20px;
            font-weight: 700;
            color: var(--gold);
            display: flex;
            align-items: center;
            gap: 10px;
        }

        .user-info {
            display: flex;
            align-items: center;
            gap: 15px;
        }

        .date-badge {
            background: rgba(30, 41, 59, 0.7);
            border: 1px solid rgba(200, 169, 126, 0.2);
            border-radius: 30px;
            padding: 8px 16px;
            font-size: 13px;
            color: var(--text-muted);
            backdrop-filter: blur(10px);
        }

        .user-avatar {
            width: 45px;
            height: 45px;
            background: var(--gradient-gold);
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 20px;
            font-weight: bold;
            color: var(--dark);
            cursor: pointer;
            border: 2px solid var(--gold);
            position: relative;
        }

        .user-avatar::after {
            content: '';
            position: absolute;
            bottom: 2px;
            right: 2px;
            width: 10px;
            height: 10px;
            background: var(--success);
            border-radius: 50%;
            border: 2px solid var(--dark);
        }

        /* المحتوى الرئيسي */
        .main-content {
            margin-top: 80px;
            padding: 20px;
            max-width: 1200px;
            margin-left: auto;
            margin-right: auto;
        }

        /* بطاقات المباريات */
        .matches-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(350px, 1fr));
            gap: 20px;
            margin-bottom: 30px;
        }

        .match-card {
            background: linear-gradient(135deg, rgba(30, 41, 59, 0.7), rgba(15, 23, 42, 0.7));
            backdrop-filter: blur(20px);
            -webkit-backdrop-filter: blur(20px);
            border: 1px solid rgba(200, 169, 126, 0.2);
            border-radius: 30px;
            padding: 25px;
            transition: all 0.3s;
            position: relative;
            overflow: hidden;
        }

        .match-card:hover {
            border-color: var(--gold);
            box-shadow: var(--shadow-gold);
            transform: translateY(-5px);
        }

        .match-card::before {
            content: '';
            position: absolute;
            top: 0;
            left: 0;
            right: 0;
            height: 3px;
            background: var(--gradient-gold);
            opacity: 0;
            transition: opacity 0.3s;
        }

        .match-card:hover::before {
            opacity: 1;
        }

        .match-teams {
            display: flex;
            align-items: center;
            justify-content: space-between;
            margin-bottom: 20px;
        }

        .team {
            text-align: center;
            flex: 1;
        }

        .team-logo {
            width: 60px;
            height: 60px;
            background: rgba(200, 169, 126, 0.1);
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            margin: 0 auto 10px;
            font-size: 28px;
            color: var(--gold);
            border: 2px solid var(--gold);
        }

        .team-name {
            font-weight: 700;
            color: var(--text);
            margin-bottom: 5px;
        }

        .team-league {
            font-size: 12px;
            color: var(--text-muted);
        }

        .match-vs {
            font-size: 24px;
            font-weight: 900;
            color: var(--gold);
            padding: 0 15px;
        }

        .match-info {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 20px;
            padding: 15px;
            background: rgba(0, 0, 0, 0.2);
            border-radius: 20px;
        }

        .match-date {
            display: flex;
            align-items: center;
            gap: 8px;
            color: var(--text-muted);
            font-size: 14px;
        }

        .match-date i {
            color: var(--gold);
        }

        .match-multipliers {
            display: flex;
            gap: 8px;
        }

        .multiplier-badge {
            padding: 5px 12px;
            background: rgba(200, 169, 126, 0.1);
            border: 1px solid var(--gold);
            border-radius: 30px;
            font-size: 12px;
            font-weight: 700;
            color: var(--gold);
        }

        .score-inputs {
            display: flex;
            align-items: center;
            gap: 15px;
            margin: 20px 0;
        }

        .score-input {
            flex: 1;
            text-align: center;
        }

        .score-input label {
            display: block;
            color: var(--text-muted);
            font-size: 12px;
            margin-bottom: 5px;
        }

        .score-field {
            width: 80px;
            padding: 10px;
            background: rgba(255, 255, 255, 0.03);
            border: 2px solid rgba(200, 169, 126, 0.3);
            border-radius: 15px;
            color: white;
            font-size: 18px;
            font-weight: 700;
            text-align: center;
            margin: 0 auto;
        }

        .score-field:focus {
            outline: none;
            border-color: var(--gold);
        }

        .bet-amount {
            margin: 20px 0;
        }

        .bet-amount label {
            display: block;
            color: var(--text-muted);
            font-size: 14px;
            margin-bottom: 8px;
        }

        .amount-input {
            width: 100%;
            padding: 15px;
            background: rgba(255, 255, 255, 0.03);
            border: 2px solid rgba(200, 169, 126, 0.3);
            border-radius: 20px;
            color: white;
            font-size: 16px;
        }

        .amount-input:focus {
            outline: none;
            border-color: var(--gold);
        }

        .potential-win {
            background: rgba(39, 174, 96, 0.1);
            border: 2px solid var(--success);
            border-radius: 20px;
            padding: 15px;
            margin: 20px 0;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .win-label {
            color: var(--text-muted);
            font-size: 14px;
        }

        .win-amount {
            font-size: 24px;
            font-weight: 900;
            color: var(--success);
        }

        .place-bet-btn {
            width: 100%;
            padding: 18px;
            background: var(--gradient-gold);
            border: none;
            border-radius: 30px;
            color: var(--dark);
            font-weight: 700;
            font-size: 16px;
            cursor: pointer;
            transition: all 0.3s;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 10px;
        }

        .place-bet-btn:hover {
            transform: translateY(-3px);
            box-shadow: var(--shadow-gold);
        }

        .place-bet-btn:disabled {
            opacity: 0.5;
            cursor: not-allowed;
            transform: none;
        }

        /* بطاقة معلومات الرهان */
        .multiplier-info {
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            gap: 10px;
            margin: 20px 0;
            text-align: center;
        }

        .multiplier-item {
            background: rgba(255, 255, 255, 0.02);
            border-radius: 15px;
            padding: 10px;
            border: 1px solid rgba(200, 169, 126, 0.2);
        }

        .multiplier-item.active {
            border-color: var(--gold);
            background: rgba(200, 169, 126, 0.1);
        }

        .multiplier-value {
            font-size: 20px;
            font-weight: 900;
            color: var(--gold);
        }

        .multiplier-desc {
            font-size: 11px;
            color: var(--text-muted);
        }

        /* سجل الرهانات */
        .history-section {
            background: rgba(30, 41, 59, 0.5);
            backdrop-filter: blur(10px);
            border-radius: 30px;
            padding: 25px;
            margin-top: 30px;
        }

        .section-title {
            display: flex;
            align-items: center;
            gap: 15px;
            margin-bottom: 25px;
        }

        .section-icon {
            width: 50px;
            height: 50px;
            background: rgba(200, 169, 126, 0.1);
            border-radius: 15px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 24px;
            color: var(--gold);
        }

        .section-title h2 {
            font-size: 20px;
            font-weight: 700;
            color: var(--gold);
            flex: 1;
        }

        .bets-list {
            display: flex;
            flex-direction: column;
            gap: 15px;
        }

        .bet-item {
            background: rgba(255, 255, 255, 0.02);
            border-radius: 20px;
            padding: 20px;
            border-right: 4px solid transparent;
            transition: all 0.3s;
        }

        .bet-item:hover {
            background: rgba(200, 169, 126, 0.05);
            transform: translateX(-5px);
        }

        .bet-item.won {
            border-right-color: var(--success);
        }

        .bet-item.lost {
            border-right-color: var(--danger);
        }

        .bet-item.pending {
            border-right-color: var(--warning);
        }

        .bet-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 12px;
        }

        .bet-teams {
            font-weight: 700;
            color: var(--gold);
        }

        .bet-status {
            padding: 4px 12px;
            border-radius: 30px;
            font-size: 11px;
            font-weight: 600;
        }

        .status-won {
            background: rgba(39, 174, 96, 0.2);
            color: var(--success);
        }

        .status-lost {
            background: rgba(231, 76, 60, 0.2);
            color: var(--danger);
        }

        .status-pending {
            background: rgba(243, 156, 18, 0.2);
            color: var(--warning);
        }

        .bet-details {
            display: flex;
            gap: 20px;
            margin-bottom: 10px;
            font-size: 13px;
        }

        .bet-prediction {
            color: var(--text-muted);
        }

        .bet-prediction strong {
            color: var(--gold);
        }

        .bet-multiplier {
            color: var(--success);
        }

        .bet-amounts {
            display: flex;
            justify-content: space-between;
            font-size: 14px;
            padding-top: 10px;
            border-top: 1px solid rgba(255, 255, 255, 0.05);
        }

        .bet-stake {
            color: var(--text-muted);
        }

        .bet-won {
            color: var(--success);
            font-weight: 700;
        }

        .empty-bets {
            text-align: center;
            padding: 60px 20px;
            background: rgba(30, 41, 59, 0.3);
            border-radius: 30px;
            border: 2px dashed rgba(200, 169, 126, 0.3);
        }

        .empty-bets i {
            font-size: 60px;
            color: var(--gold);
            margin-bottom: 15px;
            opacity: 0.5;
        }

        .empty-bets h3 {
            color: var(--gold);
            margin-bottom: 10px;
        }

        .empty-bets p {
            color: var(--text-muted);
        }

        /* الفلتر */
        .filters {
            display: flex;
            gap: 10px;
            flex-wrap: wrap;
            margin-bottom: 25px;
        }

        .filter-btn {
            padding: 10px 20px;
            background: rgba(255, 255, 255, 0.03);
            border: 1px solid rgba(200, 169, 126, 0.2);
            border-radius: 30px;
            color: var(--text-muted);
            font-size: 13px;
            cursor: pointer;
            transition: all 0.3s;
        }

        .filter-btn.active,
        .filter-btn:hover {
            background: var(--gold);
            color: var(--dark);
            border-color: var(--gold);
        }

        /* الشريط السفلي */
        .bottom-nav {
            position: fixed;
            bottom: 20px;
            left: 50%;
            transform: translateX(-50%);
            width: 90%;
            max-width: 550px;
            background: rgba(15, 23, 42, 0.95);
            backdrop-filter: blur(20px);
            border-radius: 40px;
            padding: 10px 15px;
            display: flex;
            justify-content: space-around;
            align-items: center;
            border: 2px solid var(--gold);
            box-shadow: var(--shadow-gold);
            z-index: 1000;
        }

        .nav-item {
            display: flex;
            flex-direction: column;
            align-items: center;
            text-decoration: none;
            color: var(--text-muted);
            transition: all 0.3s;
            cursor: pointer;
            padding: 5px 0;
            min-width: 60px;
        }

        .nav-item.active {
            color: var(--gold);
            transform: translateY(-3px);
        }

        .nav-item i {
            font-size: 22px;
            margin-bottom: 2px;
        }

        .nav-item span {
            font-size: 11px;
            font-weight: 600;
        }

        .nav-badge {
            position: absolute;
            top: -5px;
            right: 15px;
            background: var(--danger);
            color: white;
            font-size: 9px;
            padding: 2px 5px;
            border-radius: 10px;
            min-width: 16px;
            text-align: center;
            border: 2px solid var(--gold);
            animation: pulse 2s infinite;
        }

        /* النوافذ المنبثقة */
        .modal {
            display: none;
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0, 0, 0, 0.95);
            backdrop-filter: blur(20px);
            z-index: 2000;
            align-items: center;
            justify-content: center;
            padding: 20px;
        }

        .modal.active {
            display: flex;
            animation: fadeIn 0.3s;
        }

        .modal-content {
            background: linear-gradient(135deg, #1e293b, #0f172a);
            border-radius: 30px;
            padding: 30px;
            width: 100%;
            max-width: 500px;
            border: 2px solid var(--gold);
        }

        .modal-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 20px;
        }

        .modal-title {
            font-size: 24px;
            font-weight: 900;
            color: var(--gold);
        }

        .modal-close {
            background: none;
            border: none;
            color: var(--text-muted);
            font-size: 28px;
            cursor: pointer;
        }

        .modal-body {
            text-align: center;
            padding: 20px 0;
        }

        .modal-icon {
            width: 70px;
            height: 70px;
            background: var(--success);
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            margin: 0 auto 20px;
            font-size: 32px;
            color: white;
            border: 3px solid white;
        }

        .modal-buttons {
            display: flex;
            gap: 15px;
            margin-top: 25px;
        }

        .btn {
            padding: 15px 30px;
            border-radius: 30px;
            border: none;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s;
            display: inline-flex;
            align-items: center;
            justify-content: center;
            gap: 10px;
            font-size: 15px;
            flex: 1;
        }

        .btn-primary {
            background: var(--gradient-gold);
            color: var(--dark);
        }

        .btn-success {
            background: var(--success);
            color: white;
        }

        .btn-outline {
            background: transparent;
            border: 2px solid var(--gold);
            color: var(--text);
        }

        .btn-danger {
            background: var(--danger);
            color: white;
        }

        /* الإشعارات */
        .toast {
            position: fixed;
            top: 100px;
            right: 20px;
            background: var(--success);
            color: white;
            padding: 16px 24px;
            border-radius: 50px;
            display: none;
            z-index: 3000;
            box-shadow: var(--shadow);
            border-right: 4px solid white;
            min-width: 300px;
            animation: slideInLeft 0.3s;
        }

        .toast.error { background: var(--danger); }
        .toast.warning { background: var(--warning); }

        @keyframes slideInLeft {
            from { opacity: 0; transform: translateX(100%); }
            to { opacity: 1; transform: translateX(0); }
        }

        @keyframes fadeIn {
            from { opacity: 0; }
            to { opacity: 1; }
        }

        @keyframes pulse {
            0% { transform: scale(1); }
            50% { transform: scale(1.1); }
            100% { transform: scale(1); }
        }

        /* استجابة */
        @media (max-width: 768px) {
            .matches-grid {
                grid-template-columns: 1fr;
            }

            .date-badge {
                display: none;
            }

            .multiplier-info {
                grid-template-columns: repeat(3, 1fr);
            }

            .modal-content {
                padding: 20px;
            }
        }

        @media (max-width: 480px) {
            .main-content {
                padding: 15px;
            }

            .team-logo {
                width: 45px;
                height: 45px;
                font-size: 22px;
            }

            .match-vs {
                font-size: 18px;
            }

            .score-field {
                width: 60px;
                font-size: 16px;
            }

            .toast {
                right: 10px;
                left: 10px;
                min-width: auto;
            }
        }
    </style>
</head>
<body>
    <!-- الشريط العلوي -->
    <div class="top-bar">
        <div style="display: flex; align-items: center; gap: 15px;">
            <a href="dashboard.html" class="back-btn">
                <i class="fas fa-arrow-right"></i>
            </a>
            <div class="page-title">
                <i class="fas fa-futbol"></i>
                <span>مراهنات المباريات</span>
            </div>
        </div>

        <div class="user-info">
            <div class="date-badge" id="currentDateTime"></div>
            <div class="user-avatar" id="userAvatar" onclick="toggleUserMenu()">م</div>
        </div>
    </div>

    <!-- قائمة المستخدم -->
    <div class="modal" id="userMenu" style="max-width: 250px; left: auto; right: 20px; top: 80px; bottom: auto; background: transparent; backdrop-filter: none; display: none;">
        <div class="modal-content" style="padding: 15px;">
            <div class="user-dropdown-item" onclick="window.location.href='profile.html'" style="padding: 12px; cursor: pointer; border-radius: 12px;">
                <i class="fas fa-user"></i> الملف الشخصي
            </div>
            <div class="user-dropdown-item" onclick="refreshData()" style="padding: 12px; cursor: pointer; border-radius: 12px;">
                <i class="fas fa-sync-alt"></i> تحديث
            </div>
            <div class="user-dropdown-item" onclick="logout()" style="padding: 12px; cursor: pointer; border-radius: 12px;">
                <i class="fas fa-sign-out-alt"></i> خروج
            </div>
        </div>
    </div>

    <!-- المحتوى الرئيسي -->
    <div class="main-content">
        <!-- الفلتر -->
        <div class="filters">
            <span class="filter-btn active" onclick="filterMatches('all')">جميع المباريات</span>
            <span class="filter-btn" onclick="filterMatches('live')">مباشر</span>
            <span class="filter-btn" onclick="filterMatches('upcoming')">قادمة</span>
            <span class="filter-btn" onclick="filterMatches('finished')">منتهية</span>
        </div>

        <!-- شبكة المباريات -->
        <div class="matches-grid" id="matchesGrid">
            <!-- سيتم تحميل المباريات هنا -->
        </div>

        <!-- سجل الرهانات -->
        <div class="history-section">
            <div class="section-title">
                <div class="section-icon">
                    <i class="fas fa-history"></i>
                </div>
                <h2>سجل رهاناتي</h2>
                <span class="filter-btn" onclick="loadBetsHistory()"><i class="fas fa-sync-alt"></i></span>
            </div>

            <div class="bets-list" id="betsList">
                <!-- سيتم تحميل سجل الرهانات هنا -->
            </div>
        </div>
    </div>

    <!-- الشريط السفلي -->
    <div class="bottom-nav">
        <div class="nav-item" onclick="window.location.href='dashboard.html'">
            <i class="fas fa-home"></i>
            <span>الرئيسية</span>
        </div>
        <div class="nav-item" onclick="window.location.href='withdrawals.html'">
            <i class="fas fa-money-bill-wave"></i>
            <span>السحب</span>
            <span class="nav-badge" id="withdrawalsBadge" style="display: none;">0</span>
        </div>
        <div class="nav-item active" onclick="window.location.href='bets.html'">
            <i class="fas fa-futbol"></i>
            <span>المراهنات</span>
            <span class="nav-badge" id="betsBadge" style="display: none;">!</span>
        </div>
        <div class="nav-item" onclick="window.location.href='stats.html'">
            <i class="fas fa-chart-pie"></i>
            <span>الإحصائيات</span>
        </div>
        <div class="nav-item" onclick="window.location.href='profile.html'">
            <i class="fas fa-user"></i>
            <span>حسابي</span>
        </div>
    </div>

    <!-- نافذة تأكيد الرهان -->
    <div class="modal" id="confirmBetModal">
        <div class="modal-content">
            <div class="modal-header">
                <h3 class="modal-title">تأكيد الرهان</h3>
                <button class="modal-close" onclick="closeConfirmModal()">&times;</button>
            </div>
            <div class="modal-body">
                <div class="modal-icon">
                    <i class="fas fa-check"></i>
                </div>
                <p style="margin-bottom: 10px;">هل أنت متأكد من رهانك؟</p>
                <div id="betSummary" style="background: rgba(0,0,0,0.2); border-radius: 15px; padding: 15px; margin: 15px 0;"></div>
            </div>
            <div class="modal-buttons">
                <button class="btn btn-outline" onclick="closeConfirmModal()">إلغاء</button>
                <button class="btn btn-success" onclick="submitBet()">تأكيد الرهان</button>
            </div>
        </div>
    </div>

    <!-- نافذة نتيجة الرهان -->
    <div class="modal" id="resultModal">
        <div class="modal-content">
            <div class="modal-header">
                <h3 class="modal-title" id="resultTitle">نتيجة الرهان</h3>
                <button class="modal-close" onclick="closeResultModal()">&times;</button>
            </div>
            <div class="modal-body">
                <div class="modal-icon" id="resultIcon">
                    <i class="fas fa-trophy"></i>
                </div>
                <p id="resultMessage" style="font-size: 18px; margin-bottom: 10px;"></p>
                <div id="resultAmount" style="font-size: 28px; font-weight: 900; color: var(--success); margin: 15px 0;"></div>
            </div>
            <div class="modal-buttons">
                <button class="btn btn-primary" onclick="closeResultModal()">حسناً</button>
            </div>
        </div>
    </div>

    <!-- الإشعارات -->
    <div class="toast" id="toast"></div>

    <script>
        AOS.init({
            duration: 800,
            once: true
        });

        // متغيرات عامة
        let currentUser = null;
        let currentMatch = null;
        let currentBet = {
            matchId: null,
            homeScore: 0,
            awayScore: 0,
            amount: 0,
            multiplier: 0
        };

        // تهيئة الصفحة
        document.addEventListener('DOMContentLoaded', async function() {
            await checkUser();
            await loadMatches();
            await loadBetsHistory();
            updateDateTime();
            setInterval(updateDateTime, 1000);
        });

        // تحديث الوقت
        function updateDateTime() {
            const now = new Date();
            document.getElementById('currentDateTime').textContent = now.toLocaleString('ar-SA', {
                hour: '2-digit', minute: '2-digit', day: 'numeric', month: 'short'
            });
        }

        // التحقق من المستخدم
        async function checkUser() {
            const savedUser = localStorage.getItem('current_user');
            if (!savedUser) {
                window.location.href = 'index.html';
                return;
            }
            currentUser = JSON.parse(savedUser);
            
            if (window.supabaseHelpers) {
                const result = await window.supabaseHelpers.getUserById(currentUser.id);
                if (result.success && result.data) {
                    currentUser = result.data;
                    localStorage.setItem('current_user', JSON.stringify(currentUser));
                }
            }
            
            document.getElementById('userAvatar').textContent = currentUser.name?.charAt(0).toUpperCase() || 'م';
        }

        // تحميل المباريات
        async function loadMatches(filter = 'all') {
            try {
                const { data, error } = await supabaseClient
                    .from('betting_matches')
                    .select('*')
                    .order('match_date', { ascending: true });

                if (error) throw error;

                let matches = data || [];
                
                // تصفية المباريات
                const now = new Date();
                if (filter === 'live') {
                    matches = matches.filter(m => m.status === 'live');
                } else if (filter === 'upcoming') {
                    matches = matches.filter(m => m.status === 'upcoming' && new Date(m.match_date) > now);
                } else if (filter === 'finished') {
                    matches = matches.filter(m => m.status === 'finished');
                }

                displayMatches(matches);
            } catch (error) {
                console.error('خطأ في تحميل المباريات:', error);
                showToast('❌ فشل تحميل المباريات', 'error');
            }
        }

        // عرض المباريات
        function displayMatches(matches) {
            const grid = document.getElementById('matchesGrid');
            
            if (!matches || matches.length === 0) {
                grid.innerHTML = `
                    <div style="grid-column: 1/-1; text-align: center; padding: 60px; background: rgba(30,41,59,0.5); border-radius: 30px;">
                        <i class="fas fa-futbol fa-3x" style="color: var(--gold); opacity: 0.5; margin-bottom: 15px;"></i>
                        <h3 style="color: var(--gold);">لا توجد مباريات متاحة</h3>
                        <p style="color: var(--text-muted);">سيتم إضافة مباريات قريباً</p>
                    </div>
                `;
                return;
            }

            let html = '';
            matches.forEach(match => {
                const matchDate = new Date(match.match_date);
                const now = new Date();
                const isUpcoming = matchDate > now;
                const isFinished = match.status === 'finished';
                
                html += `
                    <div class="match-card" data-aos="fade-up">
                        <div class="match-teams">
                            <div class="team">
                                <div class="team-logo">
                                    <i class="fas ${match.home_logo || 'fa-shield-alt'}"></i>
                                </div>
                                <div class="team-name">${match.home_team}</div>
                                <div class="team-league">${match.league || 'دوري أبطال أوروبا'}</div>
                            </div>
                            <div class="match-vs">VS</div>
                            <div class="team">
                                <div class="team-logo">
                                    <i class="fas ${match.away_logo || 'fa-shield-alt'}"></i>
                                </div>
                                <div class="team-name">${match.away_team}</div>
                                <div class="team-league">${match.league || 'دوري أبطال أوروبا'}</div>
                            </div>
                        </div>

                        <div class="match-info">
                            <div class="match-date">
                                <i class="far fa-calendar-alt"></i>
                                ${matchDate.toLocaleDateString('ar-SA')} - ${matchDate.toLocaleTimeString('ar-SA', {hour: '2-digit', minute:'2-digit'})}
                            </div>
                            <div class="match-multipliers">
                                <span class="multiplier-badge">X${match.multiplier_2 || 2}</span>
                                <span class="multiplier-badge">X${match.multiplier_3 || 3}</span>
                                <span class="multiplier-badge">X${match.multiplier_4 || 4}</span>
                            </div>
                        </div>

                        ${isFinished ? `
                            <div style="text-align: center; padding: 15px; background: rgba(255,255,255,0.03); border-radius: 20px; margin: 15px 0;">
                                <span style="color: var(--gold); font-size: 18px;">${match.final_score || '0-0'}</span>
                            </div>
                        ` : isUpcoming ? `
                            <div class="score-inputs">
                                <div class="score-input">
                                    <label>${match.home_team}</label>
                                    <input type="number" class="score-field" id="home_${match.id}" min="0" max="10" value="0" onchange="calculateMultiplier(${match.id})">
                                </div>
                                <div style="font-size: 24px; color: var(--gold);">-</div>
                                <div class="score-input">
                                    <label>${match.away_team}</label>
                                    <input type="number" class="score-field" id="away_${match.id}" min="0" max="10" value="0" onchange="calculateMultiplier(${match.id})">
                                </div>
                            </div>

                            <div class="multiplier-info" id="multiplier_${match.id}">
                                <div class="multiplier-item" data-multiplier="2" onclick="selectMultiplier(${match.id}, 2)">
                                    <div class="multiplier-value">X2</div>
                                    <div class="multiplier-desc">فرق 1 هدف</div>
                                </div>
                                <div class="multiplier-item" data-multiplier="3" onclick="selectMultiplier(${match.id}, 3)">
                                    <div class="multiplier-value">X3</div>
                                    <div class="multiplier-desc">فرق 2 هدف</div>
                                </div>
                                <div class="multiplier-item" data-multiplier="4" onclick="selectMultiplier(${match.id}, 4)">
                                    <div class="multiplier-value">X4</div>
                                    <div class="multiplier-desc">فرق 3 أهداف</div>
                                </div>
                                <div class="multiplier-item" data-multiplier="5" onclick="selectMultiplier(${match.id}, 5)">
                                    <div class="multiplier-value">X5</div>
                                    <div class="multiplier-desc">فرق 4 أهداف</div>
                                </div>
                                <div class="multiplier-item" data-multiplier="6" onclick="selectMultiplier(${match.id}, 6)">
                                    <div class="multiplier-value">X6</div>
                                    <div class="multiplier-desc">فرق 5 أهداف</div>
                                </div>
                                <div class="multiplier-item" data-multiplier="7" onclick="selectMultiplier(${match.id}, 7)">
                                    <div class="multiplier-value">X7</div>
                                    <div class="multiplier-desc">فرق 6+ أهداف</div>
                                </div>
                            </div>

                            <div class="bet-amount">
                                <label>💰 مبلغ الرهان ($)</label>
                                <input type="number" class="amount-input" id="amount_${match.id}" min="5" max="1000" placeholder="أدخل المبلغ" onchange="updatePotentialWin(${match.id})">
                            </div>

                            <div class="potential-win" id="potential_${match.id}" style="display: none;">
                                <span class="win-label">الربح المتوقع:</span>
                                <span class="win-amount" id="winAmount_${match.id}>0$</span>
                            </div>

                            <button class="place-bet-btn" onclick="openConfirmModal(${match.id})">
                                <i class="fas fa-check-circle"></i>
                                ضع رهانك
                            </button>
                        ` : `
                            <div style="text-align: center; padding: 15px; color: var(--warning);">
                                <i class="fas fa-clock"></i> المباراة قيد الانتظار
                            </div>
                        `}
                    </div>
                `;
            });

            grid.innerHTML = html;
        }

        // فلترة المباريات
        function filterMatches(filter) {
            document.querySelectorAll('.filter-btn').forEach(btn => btn.classList.remove('active'));
            event.target.classList.add('active');
            loadMatches(filter);
        }

        // حساب المضاعف بناءً على النتيجة المتوقعة
        function calculateMultiplier(matchId) {
            const homeScore = parseInt(document.getElementById(`home_${matchId}`).value) || 0;
            const awayScore = parseInt(document.getElementById(`away_${matchId}`).value) || 0;
            const goalDiff = Math.abs(homeScore - awayScore);
            
            let multiplier = 2;
            if (goalDiff === 1) multiplier = 2;
            else if (goalDiff === 2) multiplier = 3;
            else if (goalDiff === 3) multiplier = 4;
            else if (goalDiff === 4) multiplier = 5;
            else if (goalDiff === 5) multiplier = 6;
            else if (goalDiff >= 6) multiplier = 7;
            
            // تحديث واجهة المضاعفات
            document.querySelectorAll(`#multiplier_${matchId} .multiplier-item`).forEach(item => {
                item.classList.remove('active');
            });
            
            const selectedItem = document.querySelector(`#multiplier_${matchId} .multiplier-item[data-multiplier="${multiplier}"]`);
            if (selectedItem) selectedItem.classList.add('active');
            
            updatePotentialWin(matchId);
        }

        // اختيار مضاعف يدوياً
        function selectMultiplier(matchId, multiplier) {
            document.querySelectorAll(`#multiplier_${matchId} .multiplier-item`).forEach(item => {
                item.classList.remove('active');
            });
            
            const selectedItem = document.querySelector(`#multiplier_${matchId} .multiplier-item[data-multiplier="${multiplier}"]`);
            if (selectedItem) selectedItem.classList.add('active');
            
            updatePotentialWin(matchId);
        }

        // تحديث الربح المتوقع
        function updatePotentialWin(matchId) {
            const amount = parseFloat(document.getElementById(`amount_${matchId}`).value) || 0;
            const activeMultiplier = document.querySelector(`#multiplier_${matchId} .multiplier-item.active`);
            
            if (amount >= 5 && activeMultiplier) {
                const multiplier = parseInt(activeMultiplier.dataset.multiplier);
                const potential = amount * multiplier;
                
                document.getElementById(`winAmount_${matchId}`).textContent = potential + '$';
                document.getElementById(`potential_${matchId}`).style.display = 'flex';
            } else {
                document.getElementById(`potential_${matchId}`).style.display = 'none';
            }
        }

        // فتح نافذة تأكيد الرهان
        function openConfirmModal(matchId) {
            const homeScore = parseInt(document.getElementById(`home_${matchId}`).value) || 0;
            const awayScore = parseInt(document.getElementById(`away_${matchId}`).value) || 0;
            const amount = parseFloat(document.getElementById(`amount_${matchId}`).value) || 0;
            const activeMultiplier = document.querySelector(`#multiplier_${matchId} .multiplier-item.active`);
            
            if (!activeMultiplier) {
                showToast('❌ اختر نتيجة المباراة أولاً', 'error');
                return;
            }
            
            if (amount < 5) {
                showToast('❌ الحد الأدنى للرهان 5$', 'error');
                return;
            }
            
            if (amount > (currentUser.balance || 0)) {
                showToast('❌ رصيدك غير كافي', 'error');
                return;
            }
            
            const multiplier = parseInt(activeMultiplier.dataset.multiplier);
            const potential = amount * multiplier;
            
            currentBet = {
                matchId: matchId,
                homeScore: homeScore,
                awayScore: awayScore,
                amount: amount,
                multiplier: multiplier
            };
            
            document.getElementById('betSummary').innerHTML = `
                <p><strong>النتيجة المتوقعة:</strong> ${homeScore} - ${awayScore}</p>
                <p><strong>المضاعف:</strong> X${multiplier}</p>
                <p><strong>مبلغ الرهان:</strong> ${amount}$</p>
                <p><strong>الربح المتوقع:</strong> <span style="color: var(--success);">${potential}$</span></p>
            `;
            
            document.getElementById('confirmBetModal').classList.add('active');
        }

        // إغلاق نافذة التأكيد
        function closeConfirmModal() {
            document.getElementById('confirmBetModal').classList.remove('active');
        }

        // تقديم الرهان
        async function submitBet() {
            try {
                const betData = {
                    user_id: currentUser.id,
                    match_id: currentBet.matchId,
                    predicted_home: currentBet.homeScore,
                    predicted_away: currentBet.awayScore,
                    amount: currentBet.amount,
                    multiplier: currentBet.multiplier,
                    potential_win: currentBet.amount * currentBet.multiplier,
                    status: 'pending',
                    created_at: new Date().toISOString()
                };

                const { error } = await supabaseClient
                    .from('user_bets')
                    .insert([betData]);

                if (error) throw error;

                // خصم المبلغ من الرصيد
                await supabaseClient
                    .from('users')
                    .update({ balance: currentUser.balance - currentBet.amount })
                    .eq('id', currentUser.id);

                currentUser.balance -= currentBet.amount;
                localStorage.setItem('current_user', JSON.stringify(currentUser));

                closeConfirmModal();
                showToast('✅ تم وضع الرهان بنجاح', 'success');
                
                // إعادة تعيين الحقول
                document.getElementById(`home_${currentBet.matchId}`).value = 0;
                document.getElementById(`away_${currentBet.matchId}`).value = 0;
                document.getElementById(`amount_${currentBet.matchId}`).value = '';
                document.getElementById(`potential_${currentBet.matchId}`).style.display = 'none';
                
                await loadBetsHistory();
                
            } catch (error) {
                console.error('خطأ في تقديم الرهان:', error);
                showToast('❌ فشل تقديم الرهان', 'error');
            }
        }

        // تحميل سجل الرهانات
        async function loadBetsHistory() {
            try {
                const { data, error } = await supabaseClient
                    .from('user_bets')
                    .select(`
                        *,
                        betting_matches (
                            home_team,
                            away_team,
                            final_score
                        )
                    `)
                    .eq('user_id', currentUser.id)
                    .order('created_at', { ascending: false });

                if (error) throw error;

                displayBetsHistory(data || []);
                
                // تحديث الشارة
                const pendingCount = (data || []).filter(b => b.status === 'pending').length;
                if (pendingCount > 0) {
                    document.getElementById('betsBadge').style.display = 'block';
                    document.getElementById('betsBadge').textContent = pendingCount;
                } else {
                    document.getElementById('betsBadge').style.display = 'none';
                }
                
            } catch (error) {
                console.error('خطأ في تحميل سجل الرهانات:', error);
            }
        }

        // عرض سجل الرهانات
        function displayBetsHistory(bets) {
            const container = document.getElementById('betsList');
            
            if (!bets || bets.length === 0) {
                container.innerHTML = `
                    <div class="empty-bets">
                        <i class="fas fa-ticket-alt"></i>
                        <h3>لا توجد رهانات سابقة</h3>
                        <p>ابدأ بوضع رهانك الأول الآن</p>
                    </div>
                `;
                return;
            }

            let html = '';
            bets.forEach(bet => {
                let statusClass = 'pending';
                let statusText = 'قيد الانتظار';
                let resultText = '';
                
                if (bet.status === 'won') {
                    statusClass = 'won';
                    statusText = 'فائز';
                    resultText = `<span style="color: var(--success);">+${bet.won_amount || bet.amount * bet.multiplier}$</span>`;
                } else if (bet.status === 'lost') {
                    statusClass = 'lost';
                    statusText = 'خاسر';
                    resultText = `<span style="color: var(--danger);">-${bet.amount}$</span>`;
                }
                
                const match = bet.betting_matches || {};
                const matchDate = new Date(bet.created_at).toLocaleDateString('ar-SA');
                
                html += `
                    <div class="bet-item ${statusClass}">
                        <div class="bet-header">
                            <span class="bet-teams">${match.home_team || '?'} vs ${match.away_team || '?'}</span>
                            <span class="bet-status status-${statusClass}">${statusText}</span>
                        </div>
                        <div class="bet-details">
                            <div class="bet-prediction">
                                توقع: <strong>${bet.predicted_home}-${bet.predicted_away}</strong>
                            </div>
                            <div class="bet-multiplier">
                                <i class="fas fa-times"></i> X${bet.multiplier}
                            </div>
                        </div>
                        ${match.final_score ? `
                            <div style="color: var(--gold); font-size: 13px; margin-bottom: 10px;">
                                النتيجة النهائية: ${match.final_score}
                            </div>
                        ` : ''}
                        <div class="bet-amounts">
                            <span class="bet-stake">رهان: ${bet.amount}$</span>
                            <span class="bet-won">${resultText}</span>
                        </div>
                        <div style="font-size: 11px; color: var(--text-muted); margin-top: 8px;">
                            <i class="far fa-clock"></i> ${matchDate}
                        </div>
                    </div>
                `;
            });

            container.innerHTML = html;
        }

        // تحديث البيانات
        function refreshData() {
            loadMatches();
            loadBetsHistory();
            showToast('🔄 تم تحديث البيانات', 'info');
        }

        // تبديل قائمة المستخدم
        function toggleUserMenu() {
            const menu = document.getElementById('userMenu');
            menu.style.display = menu.style.display === 'none' ? 'block' : 'none';
        }

        // تسجيل الخروج
        function logout() {
            if (confirm('هل تريد تسجيل الخروج؟')) {
                localStorage.removeItem('current_user');
                window.location.href = 'index.html';
            }
        }

        // إغلاق نافذة النتيجة
        function closeResultModal() {
            document.getElementById('resultModal').classList.remove('active');
        }

        // إظهار الإشعار
        function showToast(message, type = 'success') {
            const toast = document.getElementById('toast');
            toast.textContent = message;
            toast.className = 'toast ' + type;
            toast.style.display = 'block';
            setTimeout(() => toast.style.display = 'none', 3000);
        }

        // إغلاق القوائم
        document.addEventListener('click', function(e) {
            const menu = document.getElementById('userMenu');
            const avatar = document.getElementById('userAvatar');
            if (menu && avatar && !avatar.contains(e.target) && !menu.contains(e.target)) {
                menu.style.display = 'none';
            }
        });
    </script>
</body>
</html>
