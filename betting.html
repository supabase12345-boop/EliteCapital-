<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>المراهنات - Elite Capital</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Tajawal:wght@300;400;500;700;900&display=swap" rel="stylesheet">
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script src="supabase.js"></script>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Tajawal', sans-serif;
            background: #0f172a;
            color: #fff;
            padding: 20px;
        }

        /* شريط العلوي */
        .header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 25px;
        }

        .back-btn {
            background: rgba(255,255,255,0.05);
            width: 45px;
            height: 45px;
            border-radius: 15px;
            display: flex;
            align-items: center;
            justify-content: center;
            color: #c8a97e;
            text-decoration: none;
            font-size: 22px;
        }

        .balance {
            background: rgba(39,174,96,0.1);
            border: 2px solid #27ae60;
            border-radius: 40px;
            padding: 10px 25px;
            color: #27ae60;
            font-weight: 700;
            font-size: 18px;
            display: flex;
            align-items: center;
            gap: 10px;
        }

        /* إحصائيات */
        .stats {
            display: grid;
            grid-template-columns: repeat(4, 1fr);
            gap: 12px;
            margin-bottom: 25px;
        }

        .stat-box {
            background: rgba(255,255,255,0.03);
            border-radius: 20px;
            padding: 15px;
            text-align: center;
            border: 1px solid rgba(200,169,126,0.2);
        }

        .stat-num {
            font-size: 22px;
            font-weight: 900;
            color: #c8a97e;
        }

        .stat-label {
            font-size: 12px;
            color: rgba(255,255,255,0.5);
        }

        /* بطاقة المباراة */
        .match-card {
            background: rgba(255,255,255,0.02);
            border-radius: 40px;
            padding: 25px;
            margin-bottom: 20px;
            border: 1px solid rgba(200,169,126,0.2);
        }

        /* رأس المباراة */
        .match-header {
            display: flex;
            justify-content: space-between;
            color: rgba(255,255,255,0.5);
            font-size: 14px;
            margin-bottom: 20px;
        }

        .league {
            background: rgba(200,169,126,0.1);
            padding: 5px 15px;
            border-radius: 30px;
            color: #c8a97e;
        }

        /* الفرق - بشكل أفقي */
        .teams {
            display: flex;
            align-items: center;
            justify-content: space-between;
            margin-bottom: 25px;
        }

        .team {
            display: flex;
            flex-direction: column;
            align-items: center;
            flex: 1;
        }

        .team-logo {
            width: 60px;
            height: 60px;
            background: rgba(200,169,126,0.1);
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 24px;
            font-weight: bold;
            color: #c8a97e;
            border: 2px solid #c8a97e;
            margin-bottom: 8px;
        }

        .team-name {
            font-size: 16px;
            font-weight: 600;
        }

        .vs {
            font-size: 18px;
            color: #c8a97e;
            font-weight: 900;
            background: rgba(200,169,126,0.1);
            width: 40px;
            height: 40px;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            border: 2px solid #c8a97e;
        }

        /* خيارات الرهان */
        .bet-options {
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            gap: 10px;
            margin-bottom: 25px;
        }

        .bet-option {
            background: rgba(255,255,255,0.03);
            border: 1px solid rgba(200,169,126,0.3);
            border-radius: 25px;
            padding: 15px;
            text-align: center;
            cursor: pointer;
            transition: 0.2s;
        }

        .bet-option.selected {
            background: #c8a97e;
        }

        .bet-option.selected .bet-label,
        .bet-option.selected .bet-value {
            color: #0f172a;
        }

        .bet-label {
            font-size: 13px;
            color: rgba(255,255,255,0.5);
            margin-bottom: 5px;
        }

        .bet-value {
            font-size: 20px;
            font-weight: 900;
            color: #c8a97e;
        }

        /* النتيجة الدقيقة */
        .exact-title {
            color: rgba(255,255,255,0.5);
            margin-bottom: 15px;
            font-size: 14px;
        }

        .exact-inputs {
            display: flex;
            align-items: center;
            gap: 15px;
            margin-bottom: 15px;
        }

        .team-input {
            flex: 1;
            text-align: center;
        }

        .team-input label {
            display: block;
            font-size: 12px;
            color: rgba(255,255,255,0.5);
            margin-bottom: 5px;
        }

        .team-input input {
            width: 100%;
            padding: 12px;
            background: rgba(0,0,0,0.3);
            border: 2px solid rgba(200,169,126,0.3);
            border-radius: 15px;
            color: white;
            font-size: 20px;
            text-align: center;
        }

        .dash {
            font-size: 24px;
            color: #c8a97e;
            font-weight: 900;
        }

        .exact-badge {
            display: inline-block;
            background: rgba(200,169,126,0.1);
            border: 1px solid #c8a97e;
            color: #c8a97e;
            padding: 5px 15px;
            border-radius: 30px;
            font-size: 13px;
            margin-bottom: 20px;
        }

        /* قسم المبلغ */
        .amount-section {
            margin: 20px 0;
        }

        .amount-label {
            display: flex;
            justify-content: space-between;
            color: rgba(255,255,255,0.5);
            margin-bottom: 10px;
        }

        .amount-input {
            width: 100%;
            padding: 15px;
            background: rgba(0,0,0,0.3);
            border: 2px solid rgba(200,169,126,0.3);
            border-radius: 20px;
            color: white;
            font-size: 18px;
            margin-bottom: 10px;
        }

        .quick-amounts {
            display: flex;
            gap: 8px;
            flex-wrap: wrap;
            margin-bottom: 15px;
        }

        .quick-amount {
            padding: 8px 15px;
            background: rgba(255,255,255,0.03);
            border: 1px solid rgba(200,169,126,0.3);
            border-radius: 30px;
            color: rgba(255,255,255,0.7);
            font-size: 13px;
            cursor: pointer;
        }

        .quick-amount:hover {
            background: #c8a97e;
            color: #0f172a;
        }

        /* الربح المحتمل */
        .profit-box {
            background: rgba(39,174,96,0.1);
            border: 2px solid #27ae60;
            border-radius: 20px;
            padding: 20px;
            text-align: center;
            margin: 20px 0;
        }

        .profit-label {
            color: rgba(255,255,255,0.5);
            font-size: 14px;
            margin-bottom: 8px;
        }

        .profit-amount {
            font-size: 36px;
            font-weight: 900;
            color: #27ae60;
        }

        /* زر التأكيد */
        .confirm-btn {
            width: 100%;
            padding: 18px;
            background: linear-gradient(135deg, #c8a97e, #b38b5b);
            border: none;
            border-radius: 40px;
            color: #0f172a;
            font-size: 18px;
            font-weight: 700;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 10px;
        }

        /* سجل الرهانات */
        .history {
            margin-top: 30px;
        }

        .history-title {
            display: flex;
            align-items: center;
            gap: 10px;
            margin-bottom: 15px;
        }

        .history-title i {
            color: #c8a97e;
        }

        .history-list {
            background: rgba(255,255,255,0.02);
            border-radius: 30px;
            padding: 15px;
        }

        .history-item {
            display: flex;
            align-items: center;
            gap: 15px;
            padding: 12px;
            border-bottom: 1px solid rgba(255,255,255,0.05);
        }

        .history-icon {
            width: 40px;
            height: 40px;
            border-radius: 12px;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .history-icon.won { background: rgba(39,174,96,0.2); color: #27ae60; }
        .history-icon.lost { background: rgba(231,76,60,0.2); color: #e74c3c; }
        .history-icon.pending { background: rgba(243,156,18,0.2); color: #f39c12; }

        .history-info {
            flex: 1;
        }

        .history-match {
            font-weight: 600;
            margin-bottom: 3px;
        }

        .history-details {
            display: flex;
            gap: 15px;
            font-size: 12px;
            color: rgba(255,255,255,0.5);
        }

        /* نافذة التأكيد */
        .modal {
            position: fixed;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background: rgba(0,0,0,0.95);
            display: none;
            align-items: center;
            justify-content: center;
            padding: 20px;
            z-index: 1000;
        }

        .modal.active {
            display: flex;
        }

        .modal-content {
            background: #1e293b;
            border-radius: 40px;
            padding: 30px;
            max-width: 400px;
            width: 100%;
            border: 2px solid #c8a97e;
        }

        .modal-title {
            text-align: center;
            color: #c8a97e;
            font-size: 24px;
            margin-bottom: 20px;
        }

        .modal-detail {
            background: rgba(0,0,0,0.3);
            border-radius: 20px;
            padding: 20px;
            margin: 20px 0;
        }

        .modal-row {
            display: flex;
            justify-content: space-between;
            margin-bottom: 10px;
            padding-bottom: 10px;
            border-bottom: 1px solid rgba(255,255,255,0.05);
        }

        .modal-buttons {
            display: flex;
            gap: 10px;
        }

        .modal-btn {
            flex: 1;
            padding: 15px;
            border-radius: 30px;
            border: none;
            font-weight: 700;
            cursor: pointer;
        }

        .btn-cancel {
            background: transparent;
            border: 2px solid #c8a97e;
            color: white;
        }

        .btn-confirm {
            background: #c8a97e;
            color: #0f172a;
        }

        .toast {
            position: fixed;
            top: 100px;
            right: 20px;
            background: #27ae60;
            color: white;
            padding: 15px 25px;
            border-radius: 50px;
            display: none;
            z-index: 1000;
        }

        @media (max-width: 600px) {
            .stats {
                grid-template-columns: repeat(2, 1fr);
            }
        }
    </style>
</head>
<body>
    <!-- الهيدر -->
    <div class="header">
        <a href="dashboard.html" class="back-btn"><i class="fas fa-arrow-right"></i></a>
        <div class="balance" id="balanceDisplay">
            <i class="fas fa-wallet"></i> <span>0$</span>
        </div>
    </div>

    <!-- الإحصائيات -->
    <div class="stats">
        <div class="stat-box">
            <div class="stat-num" id="totalBets">0</div>
            <div class="stat-label">رهاناتي</div>
        </div>
        <div class="stat-box">
            <div class="stat-num" id="totalAmount">0$</div>
            <div class="stat-label">الإجمالي</div>
        </div>
        <div class="stat-box">
            <div class="stat-num" id="totalWins">0$</div>
            <div class="stat-label">أرباحي</div>
        </div>
        <div class="stat-box">
            <div class="stat-num" id="netProfit">0$</div>
            <div class="stat-label">صافي</div>
        </div>
    </div>

    <!-- مكان المباريات -->
    <div id="matchesContainer"></div>

    <!-- سجل الرهانات -->
    <div class="history">
        <div class="history-title">
            <i class="fas fa-history"></i>
            <h3>سجل رهاناتي</h3>
        </div>
        <div class="history-list" id="betsList">
            <p style="text-align: center; color: rgba(255,255,255,0.5); padding: 20px;">جاري التحميل...</p>
        </div>
    </div>

    <!-- نافذة التأكيد -->
    <div class="modal" id="confirmModal">
        <div class="modal-content">
            <h3 class="modal-title">تأكيد الرهان</h3>
            <div class="modal-detail" id="confirmDetails"></div>
            <div class="modal-buttons">
                <button class="modal-btn btn-cancel" onclick="closeModal()">إلغاء</button>
                <button class="modal-btn btn-confirm" onclick="submitBet()">تأكيد</button>
            </div>
        </div>
    </div>

    <!-- الإشعارات -->
    <div class="toast" id="toast"></div>

    <script>
        let currentUser = null;
        let allMatches = [];
        let userBets = [];
        let selectedMatch = null;
        let selectedBetType = null;
        let selectedBetValue = null;
        let selectedOdds = 1.6;
        let currentBetData = null;

        // بداية التشغيل
        document.addEventListener('DOMContentLoaded', async () => {
            await checkUser();
            await loadUserData();
            await loadMatches();
            await loadUserBets();
        });

        // التحقق من المستخدم
        async function checkUser() {
            const saved = localStorage.getItem('current_user');
            if (!saved) {
                window.location.href = 'index.html';
                return;
            }
            currentUser = JSON.parse(saved);
            
            const result = await window.supabaseHelpers?.getUserById(currentUser.id);
            if (result?.success) {
                currentUser = result.data;
                localStorage.setItem('current_user', JSON.stringify(currentUser));
            }
        }

        // تحميل بيانات المستخدم
        async function loadUserData() {
            document.getElementById('balanceDisplay').innerHTML = `
                <i class="fas fa-wallet"></i> <span>${(currentUser.balance || 0).toFixed(2)}$</span>
            `;
        }

        // تحميل المباريات
        async function loadMatches() {
            const result = await window.supabaseHelpers?.getAllMatches();
            if (result?.success) {
                allMatches = result.data.filter(m => m.status === 'upcoming');
                displayMatches();
            }
        }

        // عرض المباريات
        function displayMatches() {
            const container = document.getElementById('matchesContainer');
            
            if (!allMatches.length) {
                container.innerHTML = '<p style="text-align: center; color: rgba(255,255,255,0.5); padding: 40px;">لا توجد مباريات متاحة</p>';
                return;
            }

            let html = '';
            allMatches.forEach(match => {
                const date = new Date(match.match_date);
                
                html += `
                    <div class="match-card" id="match-${match.id}">
                        <!-- رأس المباراة -->
                        <div class="match-header">
                            <span class="league">${match.league || 'الدوري الإسباني'}</span>
                            <span>${date.getHours()}:${date.getMinutes()}</span>
                        </div>

                        <!-- الفرق أفقياً -->
                        <div class="teams">
                            <div class="team">
                                <div class="team-logo">${match.team1?.charAt(0) || 'A'}</div>
                                <div class="team-name">${match.team1}</div>
                            </div>
                            <div class="vs">VS</div>
                            <div class="team">
                                <div class="team-logo">${match.team2?.charAt(0) || 'B'}</div>
                                <div class="team-name">${match.team2}</div>
                            </div>
                        </div>

                        <!-- خيارات الرهان -->
                        <div class="bet-options" id="options-${match.id}">
                            <div class="bet-option" onclick="selectBet(${match.id}, '1', 1.6)">
                                <div class="bet-label">فوز</div>
                                <div class="bet-value">1.6</div>
                            </div>
                            <div class="bet-option" onclick="selectBet(${match.id}, 'X', 1.6)">
                                <div class="bet-label">تعادل</div>
                                <div class="bet-value">1.6</div>
                            </div>
                            <div class="bet-option" onclick="selectBet(${match.id}, '2', 1.6)">
                                <div class="bet-label">فوز</div>
                                <div class="bet-value">1.6</div>
                            </div>
                        </div>

                        <!-- النتيجة الدقيقة -->
                        <div class="exact-title">
                            <i class="fas fa-bullseye" style="color: #c8a97e;"></i> إجمالي الأهداف المتوقعة:
                        </div>
                        <div class="exact-inputs">
                            <div class="team-input">
                                <label>${match.team1}</label>
                                <input type="number" id="score1-${match.id}" min="0" max="10" value="0" onchange="updateExact(${match.id})">
                            </div>
                            <span class="dash">-</span>
                            <div class="team-input">
                                <label>${match.team2}</label>
                                <input type="number" id="score2-${match.id}" min="0" max="10" value="0" onchange="updateExact(${match.id})">
                            </div>
                        </div>
                        <div class="exact-badge">✨ نتيجة دقيقة x2.5</div>

                        <!-- قسم المبلغ (مخفي) -->
                        <div id="amount-section-${match.id}" style="display: none;">
                            <div class="amount-label">
                                <span>مبلغ الرهان</span>
                                <span>${(currentUser.balance || 0).toFixed(2)}$</span>
                            </div>
                            <input type="number" class="amount-input" id="amount-${match.id}" placeholder="أدخل المبلغ" min="5" oninput="updateProfit(${match.id})">
                            
                            <div class="quick-amounts">
                                <span class="quick-amount" onclick="setAmount(${match.id}, 10)">10$</span>
                                <span class="quick-amount" onclick="setAmount(${match.id}, 25)">25$</span>
                                <span class="quick-amount" onclick="setAmount(${match.id}, 50)">50$</span>
                                <span class="quick-amount" onclick="setAmount(${match.id}, 100)">100$</span>
                            </div>

                            <div class="profit-box" id="profit-${match.id}">
                                <div class="profit-label">الربح المحتمل</div>
                                <div class="profit-amount" id="profit-amount-${match.id}">0$</div>
                            </div>

                            <button class="confirm-btn" onclick="openModal(${match.id})">
                                <i class="fas fa-check-circle"></i> تأكيد الرهان
                            </button>
                        </div>
                    </div>
                `;
            });

            container.innerHTML = html;
        }

        // اختيار رهان
        function selectBet(matchId, value, odds) {
            document.querySelectorAll(`#options-${matchId} .bet-option`).forEach(opt => opt.classList.remove('selected'));
            event.currentTarget.classList.add('selected');
            
            selectedMatch = allMatches.find(m => m.id == matchId);
            selectedBetType = 'simple';
            selectedBetValue = value;
            selectedOdds = odds;
            
            document.getElementById(`amount-section-${matchId}`).style.display = 'block';
            document.getElementById(`score1-${matchId}`).value = 0;
            document.getElementById(`score2-${matchId}`).value = 0;
        }

        // تحديث النتيجة الدقيقة
        function updateExact(matchId) {
            const s1 = parseInt(document.getElementById(`score1-${matchId}`).value) || 0;
            const s2 = parseInt(document.getElementById(`score2-${matchId}`).value) || 0;
            
            if (s1 > 0 || s2 > 0) {
                document.querySelectorAll(`#options-${matchId} .bet-option`).forEach(opt => opt.classList.remove('selected'));
                
                selectedMatch = allMatches.find(m => m.id == matchId);
                selectedBetType = 'exact';
                selectedBetValue = `${s1}-${s2}`;
                selectedOdds = 2.5;
                
                document.getElementById(`amount-section-${matchId}`).style.display = 'block';
                
                const amount = document.getElementById(`amount-${matchId}`).value;
                if (amount) updateProfit(matchId);
            }
        }

        // تحديث الربح
        function updateProfit(matchId) {
            const amount = parseFloat(document.getElementById(`amount-${matchId}`).value) || 0;
            const s1 = parseInt(document.getElementById(`score1-${matchId}`).value) || 0;
            const s2 = parseInt(document.getElementById(`score2-${matchId}`).value) || 0;
            
            let odds = selectedOdds || 1.6;
            if (s1 > 0 || s2 > 0) odds = 2.5;
            
            const profit = amount * odds;
            document.getElementById(`profit-amount-${matchId}`).textContent = profit.toFixed(2) + '$';
        }

        // تعيين مبلغ سريع
        function setAmount(matchId, amount) {
            document.getElementById(`amount-${matchId}`).value = amount;
            updateProfit(matchId);
        }

        // فتح نافذة التأكيد
        function openModal(matchId) {
            const amount = parseFloat(document.getElementById(`amount-${matchId}`).value);
            const s1 = parseInt(document.getElementById(`score1-${matchId}`).value) || 0;
            const s2 = parseInt(document.getElementById(`score2-${matchId}`).value) || 0;
            
            if (!amount || amount < 5) {
                showToast('الحد الأدنى 5$', 'error');
                return;
            }
            
            if (amount > currentUser.balance) {
                showToast('الرصيد غير كافي', 'error');
                return;
            }

            let betText = '';
            let odds = 1.6;
            
            if (s1 > 0 || s2 > 0) {
                betText = `${s1} - ${s2}`;
                odds = 2.5;
            } else if (selectedBetValue === '1') betText = selectedMatch.team1;
            else if (selectedBetValue === 'X') betText = 'تعادل';
            else if (selectedBetValue === '2') betText = selectedMatch.team2;
            else {
                showToast('اختر توقعك', 'error');
                return;
            }

            const profit = amount * odds;

            document.getElementById('confirmDetails').innerHTML = `
                <div class="modal-row"><span>المباراة</span><span>${selectedMatch.team1} vs ${selectedMatch.team2}</span></div>
                <div class="modal-row"><span>توقعك</span><span>${betText}</span></div>
                <div class="modal-row"><span>نسبة الربح</span><span>x${odds}</span></div>
                <div class="modal-row"><span>المبلغ</span><span>${amount}$</span></div>
                <div class="modal-row"><span>الربح المحتمل</span><span style="color: #27ae60;">${profit.toFixed(2)}$</span></div>
            `;

            currentBetData = {
                matchId, amount, odds,
                betType: s1 > 0 || s2 > 0 ? 'exact' : 'simple',
                betValue: s1 > 0 || s2 > 0 ? `${s1}-${s2}` : selectedBetValue
            };

            document.getElementById('confirmModal').classList.add('active');
        }

        function closeModal() {
            document.getElementById('confirmModal').classList.remove('active');
        }

        async function submitBet() {
            if (!currentBetData) return;

            const result = await window.supabaseHelpers?.placeBet({
                userId: currentUser.id,
                matchId: currentBetData.matchId,
                betType: currentBetData.betType,
                betValue: currentBetData.betValue,
                amount: currentBetData.amount,
                odds: currentBetData.odds
            });

            if (result?.success) {
                closeModal();
                showToast('✅ تم تقديم الرهان');
                await checkUser();
                await loadUserData();
                await loadUserBets();
                await loadMatches();
            } else {
                showToast('❌ ' + (result?.error || 'فشل'), 'error');
            }
        }

        // تحميل رهانات المستخدم
        async function loadUserBets() {
            const result = await window.supabaseHelpers?.getUserBets(currentUser.id);
            if (result?.success) {
                userBets = result.data;
                displayUserBets();
                updateStats();
            }
        }

        function displayUserBets() {
            const list = document.getElementById('betsList');
            
            if (!userBets.length) {
                list.innerHTML = '<p style="text-align: center; color: rgba(255,255,255,0.5); padding: 20px;">لا توجد رهانات سابقة</p>';
                return;
            }

            let html = '';
            userBets.slice(0, 10).forEach(bet => {
                const match = bet.matches;
                html += `
                    <div class="history-item">
                        <div class="history-icon ${bet.status}">
                            <i class="fas ${bet.status === 'won' ? 'fa-trophy' : bet.status === 'lost' ? 'fa-times' : 'fa-clock'}"></i>
                        </div>
                        <div class="history-info">
                            <div class="history-match">${match?.team1} vs ${match?.team2}</div>
                            <div class="history-details">
                                <span>${bet.amount}$</span>
                                <span>x${bet.odds}</span>
                                <span>${bet.status === 'won' ? 'فائز' : bet.status === 'lost' ? 'خاسر' : 'معلق'}</span>
                            </div>
                        </div>
                    </div>
                `;
            });

            list.innerHTML = html;
        }

        function updateStats() {
            const total = userBets.length;
            const amount = userBets.reduce((s, b) => s + b.amount, 0);
            const won = userBets.filter(b => b.status === 'won').reduce((s, b) => s + (b.paid_amount || 0), 0);
            
            document.getElementById('totalBets').textContent = total;
            document.getElementById('totalAmount').textContent = amount.toFixed(2) + '$';
            document.getElementById('totalWins').textContent = won.toFixed(2) + '$';
            document.getElementById('netProfit').textContent = (won - amount).toFixed(2) + '$';
        }

        function showToast(msg, type = 'success') {
            const toast = document.getElementById('toast');
            toast.textContent = msg;
            toast.className = 'toast ' + type;
            toast.style.display = 'block';
            setTimeout(() => toast.style.display = 'none', 3000);
        }
    </script>
</body>
</html>
