<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>المراهنات الرياضية - Elite Capital</title>
    
    <!-- منع التخزين المؤقت -->
    <meta http-equiv="Cache-Control" content="no-cache, no-store, must-revalidate">
    <meta http-equiv="Pragma" content="no-cache">
    <meta http-equiv="Expires" content="0">
    
    <!-- Font Awesome 6 -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    
    <!-- Google Fonts -->
    <link href="https://fonts.googleapis.com/css2?family=Tajawal:wght@300;400;500;700;900&display=swap" rel="stylesheet">
    
    <!-- AOS Animation -->
    <link href="https://unpkg.com/aos@2.3.1/dist/aos.css" rel="stylesheet">
    
    <!-- Supabase -->
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script src="supabase.js"></script>
    
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        :root {
            --primary: #c8a97e;
            --primary-dark: #b38b5b;
            --primary-light: #dac09a;
            --secondary: #2c3e50;
            --success: #27ae60;
            --warning: #f39c12;
            --danger: #e74c3c;
            --dark: #0f172a;
            --dark-light: #1e293b;
            --text: #ffffff;
            --text-muted: rgba(255, 255, 255, 0.7);
            --gold: #c8a97e;
            --shadow: 0 20px 40px rgba(0, 0, 0, 0.3);
            --shadow-gold: 0 10px 30px rgba(200, 169, 126, 0.3);
            --gradient-gold: linear-gradient(135deg, #c8a97e, #b38b5b);
            --gradient-green: linear-gradient(135deg, #27ae60, #2ecc71);
            --gradient-red: linear-gradient(135deg, #e74c3c, #c0392b);
            --gradient-blue: linear-gradient(135deg, #3498db, #2980b9);
        }

        body {
            font-family: 'Tajawal', sans-serif;
            background: var(--dark);
            color: var(--text);
            overflow-x: hidden;
            min-height: 100vh;
            padding-bottom: 100px;
        }

        /* شريط التمرير */
        ::-webkit-scrollbar {
            width: 6px;
        }

        ::-webkit-scrollbar-track {
            background: rgba(255, 255, 255, 0.02);
        }

        ::-webkit-scrollbar-thumb {
            background: var(--gold);
            border-radius: 10px;
        }

        /* الشريط العلوي */
        .top-bar {
            position: fixed;
            top: 0;
            left: 0;
            right: 0;
            z-index: 100;
            background: rgba(15, 23, 42, 0.95);
            backdrop-filter: blur(20px);
            -webkit-backdrop-filter: blur(20px);
            border-bottom: 2px solid var(--gold);
            padding: 12px 20px;
            display: flex;
            align-items: center;
            justify-content: space-between;
        }

        .back-btn {
            width: 45px;
            height: 45px;
            background: rgba(255,255,255,0.03);
            border: 1px solid var(--glass-border);
            border-radius: 15px;
            display: flex;
            align-items: center;
            justify-content: center;
            color: var(--gold);
            font-size: 22px;
            cursor: pointer;
            transition: all 0.3s;
            text-decoration: none;
        }

        .back-btn:hover {
            background: var(--gold);
            color: var(--dark);
            transform: rotate(90deg);
        }

        .page-title {
            font-size: 22px;
            font-weight: 700;
            color: var(--gold);
            display: flex;
            align-items: center;
            gap: 12px;
        }

        .page-title i {
            font-size: 26px;
        }

        .user-info {
            display: flex;
            align-items: center;
            gap: 15px;
        }

        .balance-badge {
            background: linear-gradient(135deg, rgba(39,174,96,0.2), rgba(46,204,113,0.2));
            border: 2px solid var(--success);
            border-radius: 50px;
            padding: 8px 20px;
            font-size: 16px;
            font-weight: 700;
            color: var(--success);
            display: flex;
            align-items: center;
            gap: 8px;
            backdrop-filter: blur(10px);
        }

        .balance-badge i {
            font-size: 18px;
        }

        .user-avatar {
            width: 45px;
            height: 45px;
            background: var(--gradient-gold);
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 20px;
            font-weight: bold;
            color: var(--dark);
            cursor: pointer;
            border: 2px solid var(--gold);
            position: relative;
        }

        .user-dropdown {
            position: absolute;
            top: 60px;
            left: 0;
            width: 250px;
            background: var(--dark-light);
            border-radius: 20px;
            padding: 15px;
            border: 2px solid var(--gold);
            display: none;
            box-shadow: var(--shadow);
            z-index: 1001;
        }

        .user-dropdown.active {
            display: block;
            animation: slideDown 0.3s;
        }

        @keyframes slideDown {
            from {
                opacity: 0;
                transform: translateY(-10px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        .user-dropdown-item {
            display: flex;
            align-items: center;
            gap: 12px;
            padding: 12px 15px;
            color: var(--text);
            border-radius: 12px;
            transition: all 0.3s;
            cursor: pointer;
        }

        .user-dropdown-item:hover {
            background: rgba(200, 169, 126, 0.1);
            color: var(--gold);
        }

        /* المحتوى الرئيسي */
        .main-content {
            margin-top: 90px;
            padding: 20px;
            max-width: 1300px;
            margin-left: auto;
            margin-right: auto;
        }

        /* إحصائيات المراهنات */
        .betting-stats {
            display: grid;
            grid-template-columns: repeat(4, 1fr);
            gap: 20px;
            margin-bottom: 30px;
        }

        .stat-card {
            background: rgba(30, 41, 59, 0.5);
            backdrop-filter: blur(10px);
            border-radius: 25px;
            padding: 20px;
            border: 1px solid rgba(200, 169, 126, 0.3);
            display: flex;
            align-items: center;
            gap: 15px;
            transition: all 0.3s;
        }

        .stat-card:hover {
            transform: translateY(-5px);
            border-color: var(--gold);
            box-shadow: var(--shadow-gold);
        }

        .stat-icon {
            width: 55px;
            height: 55px;
            background: rgba(200, 169, 126, 0.1);
            border-radius: 18px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 26px;
            color: var(--gold);
        }

        .stat-info {
            flex: 1;
        }

        .stat-label {
            color: var(--text-muted);
            font-size: 13px;
            margin-bottom: 5px;
        }

        .stat-value {
            font-size: 24px;
            font-weight: 900;
            color: var(--gold);
        }

        .stat-value.success {
            color: var(--success);
        }

        .stat-value.danger {
            color: var(--danger);
        }

        /* أزرار الفلاتر */
        .filters {
            display: flex;
            gap: 15px;
            margin-bottom: 25px;
            flex-wrap: wrap;
        }

        .filter-btn {
            padding: 10px 25px;
            background: rgba(255,255,255,0.03);
            border: 1px solid rgba(200,169,126,0.3);
            border-radius: 50px;
            color: var(--text-muted);
            font-size: 15px;
            font-weight: 500;
            cursor: pointer;
            transition: all 0.3s;
            display: flex;
            align-items: center;
            gap: 8px;
        }

        .filter-btn i {
            font-size: 16px;
        }

        .filter-btn.active,
        .filter-btn:hover {
            background: var(--gold);
            color: var(--dark);
            border-color: var(--gold);
        }

        /* شبكة المباريات */
        .matches-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(350px, 1fr));
            gap: 25px;
            margin-bottom: 40px;
        }

        .match-card {
            background: linear-gradient(135deg, rgba(30, 41, 59, 0.7), rgba(15, 23, 42, 0.7));
            backdrop-filter: blur(10px);
            border-radius: 30px;
            padding: 25px;
            border: 2px solid rgba(200, 169, 126, 0.3);
            transition: all 0.4s;
            position: relative;
            overflow: hidden;
        }

        .match-card::before {
            content: '';
            position: absolute;
            top: 0;
            left: 0;
            right: 0;
            height: 4px;
            background: var(--gradient-gold);
        }

        .match-card:hover {
            transform: translateY(-10px);
            border-color: var(--gold);
            box-shadow: var(--shadow-gold);
        }

        .match-card.live {
            border-color: var(--danger);
            animation: pulse 2s infinite;
        }

        .match-card.live::before {
            background: var(--gradient-red);
        }

        @keyframes pulse {
            0% { box-shadow: 0 0 0 0 rgba(231, 76, 60, 0.4); }
            70% { box-shadow: 0 0 0 15px rgba(231, 76, 60, 0); }
            100% { box-shadow: 0 0 0 0 rgba(231, 76, 60, 0); }
        }

        .match-league {
            display: inline-block;
            padding: 5px 15px;
            background: rgba(200, 169, 126, 0.2);
            border-radius: 50px;
            color: var(--gold);
            font-size: 12px;
            margin-bottom: 15px;
            border: 1px solid var(--gold);
        }

        .match-teams {
            display: flex;
            align-items: center;
            justify-content: space-between;
            margin-bottom: 20px;
        }

        .team {
            text-align: center;
            flex: 1;
        }

        .team-logo {
            width: 60px;
            height: 60px;
            background: rgba(255,255,255,0.05);
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            margin: 0 auto 10px;
            font-size: 30px;
            font-weight: bold;
            color: var(--gold);
            border: 2px solid var(--gold);
        }

        .team-name {
            font-size: 16px;
            font-weight: 700;
            margin-bottom: 5px;
        }

        .team-score {
            font-size: 14px;
            color: var(--gold);
            font-weight: 700;
        }

        .match-vs {
            font-size: 24px;
            font-weight: 900;
            color: var(--gold);
            margin: 0 15px;
        }

        .match-time {
            background: rgba(0,0,0,0.3);
            border-radius: 50px;
            padding: 10px;
            text-align: center;
            margin-bottom: 20px;
            font-size: 15px;
            color: var(--text-muted);
            border: 1px solid rgba(200,169,126,0.3);
        }

        .match-time i {
            color: var(--gold);
            margin-left: 8px;
        }

        .match-time.live i {
            color: var(--danger);
            animation: blink 1s infinite;
        }

        @keyframes blink {
            0%, 100% { opacity: 1; }
            50% { opacity: 0.3; }
        }

        /* خيارات الرهان */
        .bet-options {
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            gap: 10px;
            margin-bottom: 20px;
        }

        .bet-option {
            background: rgba(255,255,255,0.03);
            border: 1px solid rgba(200,169,126,0.3);
            border-radius: 20px;
            padding: 15px 10px;
            text-align: center;
            cursor: pointer;
            transition: all 0.3s;
        }

        .bet-option:hover {
            background: rgba(200,169,126,0.1);
            border-color: var(--gold);
        }

        .bet-option.selected {
            background: var(--gold);
            border-color: var(--gold);
        }

        .bet-option.selected .bet-value,
        .bet-option.selected .bet-odds {
            color: var(--dark);
        }

        .bet-value {
            font-size: 18px;
            font-weight: 700;
            margin-bottom: 5px;
            color: var(--text);
        }

        .bet-odds {
            font-size: 16px;
            color: var(--gold);
            font-weight: 700;
        }

        .bet-option.selected .bet-odds {
            color: var(--dark);
        }

        .exact-score-section {
            margin-bottom: 20px;
        }

        .exact-score-title {
            font-size: 14px;
            color: var(--text-muted);
            margin-bottom: 10px;
        }

        .exact-score-inputs {
            display: flex;
            align-items: center;
            gap: 10px;
        }

        .score-input {
            flex: 1;
            padding: 12px;
            background: rgba(255,255,255,0.03);
            border: 2px solid rgba(200,169,126,0.3);
            border-radius: 20px;
            color: white;
            font-size: 16px;
            text-align: center;
        }

        .score-input:focus {
            outline: none;
            border-color: var(--gold);
        }

        .score-separator {
            font-size: 24px;
            color: var(--gold);
            font-weight: 900;
        }

        .bet-amount-section {
            margin: 20px 0;
        }

        .bet-amount-label {
            display: flex;
            justify-content: space-between;
            margin-bottom: 10px;
            color: var(--text-muted);
        }

        .bet-amount-input {
            width: 100%;
            padding: 15px;
            background: rgba(255,255,255,0.03);
            border: 2px solid rgba(200,169,126,0.3);
            border-radius: 20px;
            color: white;
            font-size: 18px;
            margin-bottom: 10px;
        }

        .quick-amounts {
            display: flex;
            gap: 8px;
            flex-wrap: wrap;
        }

        .quick-amount {
            padding: 8px 15px;
            background: rgba(255,255,255,0.03);
            border: 1px solid rgba(200,169,126,0.3);
            border-radius: 30px;
            color: var(--text-muted);
            font-size: 13px;
            cursor: pointer;
            transition: all 0.3s;
        }

        .quick-amount:hover {
            background: var(--gold);
            color: var(--dark);
        }

        .potential-win {
            background: linear-gradient(135deg, rgba(39,174,96,0.1), rgba(46,204,113,0.1));
            border: 2px solid var(--success);
            border-radius: 20px;
            padding: 15px;
            margin: 20px 0;
            text-align: center;
        }

        .potential-win-label {
            color: var(--text-muted);
            font-size: 14px;
            margin-bottom: 5px;
        }

        .potential-win-value {
            font-size: 28px;
            font-weight: 900;
            color: var(--success);
        }

        .place-bet-btn {
            width: 100%;
            padding: 18px;
            background: var(--gradient-gold);
            border: none;
            border-radius: 30px;
            color: var(--dark);
            font-size: 18px;
            font-weight: 700;
            cursor: pointer;
            transition: all 0.3s;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 10px;
        }

        .place-bet-btn:hover {
            transform: translateY(-3px);
            box-shadow: var(--shadow-gold);
        }

        .place-bet-btn:disabled {
            opacity: 0.5;
            cursor: not-allowed;
        }

        /* حالة عدم وجود مباريات */
        .no-matches {
            text-align: center;
            padding: 60px;
            background: rgba(200,169,126,0.05);
            border-radius: 40px;
            border: 2px dashed var(--gold);
            grid-column: 1/-1;
        }

        .no-matches i {
            font-size: 70px;
            color: var(--gold);
            margin-bottom: 20px;
            opacity: 0.5;
        }

        .no-matches h3 {
            font-size: 28px;
            color: var(--gold);
            margin-bottom: 10px;
        }

        .no-matches p {
            color: var(--text-muted);
        }

        /* سجل المراهنات */
        .history-section {
            background: rgba(30, 41, 59, 0.3);
            backdrop-filter: blur(10px);
            border-radius: 40px;
            padding: 30px;
            margin-top: 40px;
            border: 1px solid rgba(200,169,126,0.3);
        }

        .section-title {
            display: flex;
            align-items: center;
            gap: 15px;
            margin-bottom: 25px;
        }

        .section-title i {
            font-size: 30px;
            color: var(--gold);
        }

        .section-title h2 {
            font-size: 24px;
            font-weight: 700;
            color: var(--gold);
            flex: 1;
        }

        .history-list {
            display: flex;
            flex-direction: column;
            gap: 15px;
            max-height: 500px;
            overflow-y: auto;
            padding-left: 10px;
        }

        .history-item {
            background: rgba(255,255,255,0.02);
            border-radius: 20px;
            padding: 20px;
            display: flex;
            align-items: center;
            gap: 20px;
            border-right: 4px solid transparent;
            transition: all 0.3s;
        }

        .history-item:hover {
            background: rgba(200,169,126,0.05);
            transform: translateX(-5px);
        }

        .history-item.won {
            border-right-color: var(--success);
        }

        .history-item.lost {
            border-right-color: var(--danger);
        }

        .history-item.pending {
            border-right-color: var(--warning);
        }

        .history-icon {
            width: 50px;
            height: 50px;
            border-radius: 15px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 22px;
            flex-shrink: 0;
        }

        .history-item.won .history-icon {
            background: rgba(39,174,96,0.2);
            color: var(--success);
        }

        .history-item.lost .history-icon {
            background: rgba(231,76,60,0.2);
            color: var(--danger);
        }

        .history-item.pending .history-icon {
            background: rgba(243,156,18,0.2);
            color: var(--warning);
        }

        .history-content {
            flex: 1;
        }

        .history-match {
            font-size: 16px;
            font-weight: 700;
            margin-bottom: 5px;
        }

        .history-details {
            display: flex;
            gap: 15px;
            font-size: 13px;
            color: var(--text-muted);
            flex-wrap: wrap;
        }

        .history-amount {
            font-weight: 700;
        }

        .history-item.won .history-amount {
            color: var(--success);
        }

        .history-item.lost .history-amount {
            color: var(--danger);
        }

        .history-status {
            padding: 4px 12px;
            border-radius: 50px;
            font-size: 11px;
            font-weight: 600;
        }

        .history-item.won .history-status {
            background: rgba(39,174,96,0.2);
            color: var(--success);
        }

        .history-item.lost .history-status {
            background: rgba(231,76,60,0.2);
            color: var(--danger);
        }

        .history-item.pending .history-status {
            background: rgba(243,156,18,0.2);
            color: var(--warning);
        }

        .history-cancel {
            background: rgba(231,76,60,0.1);
            color: var(--danger);
            border: 1px solid var(--danger);
            padding: 8px 15px;
            border-radius: 30px;
            font-size: 12px;
            cursor: pointer;
            transition: all 0.3s;
        }

        .history-cancel:hover {
            background: var(--danger);
            color: white;
        }

        /* نافذة تأكيد الرهان */
        .confirm-modal {
            position: fixed;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background: rgba(0,0,0,0.95);
            backdrop-filter: blur(20px);
            z-index: 2000;
            display: none;
            align-items: center;
            justify-content: center;
            padding: 20px;
        }

        .confirm-modal.active {
            display: flex;
            animation: fadeIn 0.3s;
        }

        .confirm-content {
            background: linear-gradient(135deg, #1e293b, #0f172a);
            border-radius: 50px;
            padding: 40px;
            max-width: 450px;
            width: 100%;
            border: 3px solid var(--gold);
            text-align: center;
        }

        .confirm-icon {
            width: 80px;
            height: 80px;
            background: var(--gold);
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 40px;
            color: var(--dark);
            margin: 0 auto 20px;
            border: 3px solid white;
        }

        .confirm-title {
            font-size: 28px;
            font-weight: 900;
            color: var(--gold);
            margin-bottom: 15px;
        }

        .confirm-details {
            background: rgba(255,255,255,0.03);
            border-radius: 25px;
            padding: 25px;
            margin: 25px 0;
        }

        .confirm-row {
            display: flex;
            justify-content: space-between;
            margin-bottom: 15px;
            padding-bottom: 15px;
            border-bottom: 1px solid rgba(255,255,255,0.05);
        }

        .confirm-row:last-child {
            margin-bottom: 0;
            padding-bottom: 0;
            border-bottom: none;
        }

        .confirm-label {
            color: var(--text-muted);
        }

        .confirm-value {
            font-weight: 700;
            color: var(--gold);
        }

        .confirm-value.win {
            color: var(--success);
            font-size: 20px;
        }

        .confirm-actions {
            display: flex;
            gap: 15px;
        }

        .confirm-btn {
            flex: 1;
            padding: 15px;
            border: none;
            border-radius: 30px;
            font-weight: 700;
            font-size: 16px;
            cursor: pointer;
            transition: all 0.3s;
        }

        .confirm-btn.cancel {
            background: transparent;
            border: 2px solid var(--gold);
            color: var(--text);
        }

        .confirm-btn.confirm {
            background: var(--gold);
            color: var(--dark);
        }

        .confirm-btn:hover {
            transform: translateY(-2px);
            box-shadow: var(--shadow-gold);
        }

        /* الإشعارات */
        .toast {
            position: fixed;
            top: 100px;
            right: 20px;
            background: var(--success);
            color: white;
            padding: 16px 24px;
            border-radius: 50px;
            display: none;
            z-index: 3000;
            box-shadow: var(--shadow);
            border-right: 4px solid white;
            min-width: 300px;
            backdrop-filter: blur(10px);
            animation: slideInLeft 0.3s;
        }

        .toast.error {
            background: var(--danger);
        }

        .toast.warning {
            background: var(--warning);
        }

        .toast.info {
            background: var(--secondary);
        }

        @keyframes slideInLeft {
            from {
                opacity: 0;
                transform: translateX(100%);
            }
            to {
                opacity: 1;
                transform: translateX(0);
            }
        }

        @keyframes fadeIn {
            from { opacity: 0; }
            to { opacity: 1; }
        }

        /* تحميل */
        .loading-spinner {
            width: 50px;
            height: 50px;
            border: 3px solid rgba(255,255,255,0.1);
            border-radius: 50%;
            border-top-color: var(--gold);
            animation: spin 1s linear infinite;
            margin: 30px auto;
        }

        @keyframes spin {
            to { transform: rotate(360deg); }
        }

        /* استجابة */
        @media (max-width: 992px) {
            .betting-stats {
                grid-template-columns: repeat(2, 1fr);
            }
        }

        @media (max-width: 768px) {
            .main-content {
                padding: 15px;
            }
            
            .betting-stats {
                grid-template-columns: 1fr;
            }
            
            .matches-grid {
                grid-template-columns: 1fr;
            }
            
            .match-teams {
                flex-direction: column;
                gap: 15px;
            }
            
            .match-vs {
                margin: 10px 0;
            }
            
            .history-item {
                flex-direction: column;
                align-items: flex-start;
            }
            
            .balance-badge {
                display: none;
            }
            
            .toast {
                right: 10px;
                left: 10px;
                min-width: auto;
            }
        }
    </style>
</head>
<body>
    <!-- الشريط العلوي -->
    <div class="top-bar">
        <div style="display: flex; align-items: center; gap: 15px;">
            <a href="dashboard.html" class="back-btn">
                <i class="fas fa-arrow-right"></i>
            </a>
            <div class="page-title">
                <i class="fas fa-futbol"></i>
                <span>المراهنات الرياضية</span>
            </div>
        </div>

        <div class="user-info">
            <div class="balance-badge" id="balanceDisplay">
                <i class="fas fa-wallet"></i>
                <span>0$</span>
            </div>
            <div class="user-avatar" id="userAvatar" onclick="toggleUserMenu()">م</div>
        </div>
    </div>

    <!-- قائمة المستخدم -->
    <div class="user-dropdown" id="userDropdown">
        <div class="user-dropdown-item" onclick="window.location.href='dashboard.html'">
            <i class="fas fa-tachometer-alt"></i>
            لوحة التحكم
        </div>
        <div class="user-dropdown-item" onclick="window.location.href='profile.html'">
            <i class="fas fa-user"></i>
            الملف الشخصي
        </div>
        <div class="user-dropdown-item" onclick="window.location.href='chat.html'">
            <i class="fas fa-comments"></i>
            الدردشة المباشرة
        </div>
        <div class="user-dropdown-item" onclick="logout()">
            <i class="fas fa-sign-out-alt"></i>
            تسجيل الخروج
        </div>
    </div>

    <!-- المحتوى الرئيسي -->
    <div class="main-content">
        <!-- إحصائيات المراهنات -->
        <div class="betting-stats">
            <div class="stat-card" data-aos="fade-up">
                <div class="stat-icon">
                    <i class="fas fa-ticket-alt"></i>
                </div>
                <div class="stat-info">
                    <div class="stat-label">رهاناتي</div>
                    <div class="stat-value" id="myBetsCount">0</div>
                </div>
            </div>
            <div class="stat-card" data-aos="fade-up" data-aos-delay="50">
                <div class="stat-icon">
                    <i class="fas fa-dollar-sign"></i>
                </div>
                <div class="stat-info">
                    <div class="stat-label">إجمالي رهاناتي</div>
                    <div class="stat-value" id="myTotalBets">0$</div>
                </div>
            </div>
            <div class="stat-card" data-aos="fade-up" data-aos-delay="100">
                <div class="stat-icon">
                    <i class="fas fa-trophy"></i>
                </div>
                <div class="stat-info">
                    <div class="stat-label">أرباحي</div>
                    <div class="stat-value success" id="myWinnings">0$</div>
                </div>
            </div>
            <div class="stat-card" data-aos="fade-up" data-aos-delay="150">
                <div class="stat-icon">
                    <i class="fas fa-chart-line"></i>
                </div>
                <div class="stat-info">
                    <div class="stat-label">صافي الربح</div>
                    <div class="stat-value" id="myNetProfit">0$</div>
                </div>
            </div>
        </div>

        <!-- أزرار الفلاتر -->
        <div class="filters">
            <button class="filter-btn active" onclick="filterMatches('all')">
                <i class="fas fa-list"></i> جميع المباريات
            </button>
            <button class="filter-btn" onclick="filterMatches('upcoming')">
                <i class="fas fa-clock"></i> القادمة
            </button>
            <button class="filter-btn" onclick="filterMatches('live')">
                <i class="fas fa-play-circle"></i> المباشرة
            </button>
            <button class="filter-btn" onclick="filterMatches('finished')">
                <i class="fas fa-check-circle"></i> المنتهية
            </button>
        </div>

        <!-- شبكة المباريات -->
        <div class="matches-grid" id="matchesGrid">
            <div class="loading-spinner"></div>
        </div>

        <!-- سجل المراهنات -->
        <div class="history-section">
            <div class="section-title">
                <i class="fas fa-history"></i>
                <h2>📋 سجل رهاناتي</h2>
                <button class="filter-btn" onclick="loadUserBets()" style="padding: 8px 15px;">
                    <i class="fas fa-sync-alt"></i>
                </button>
            </div>
            <div class="history-list" id="betsHistory">
                <div style="text-align: center; color: var(--text-muted); padding: 30px;">
                    جاري التحميل...
                </div>
            </div>
        </div>
    </div>

    <!-- نافذة تأكيد الرهان -->
    <div class="confirm-modal" id="confirmModal">
        <div class="confirm-content">
            <div class="confirm-icon">
                <i class="fas fa-check"></i>
            </div>
            <h3 class="confirm-title">تأكيد الرهان</h3>
            <div class="confirm-details" id="confirmDetails">
                <!-- سيتم ملؤها بالجافاسكريبت -->
            </div>
            <div class="confirm-actions">
                <button class="confirm-btn cancel" onclick="closeConfirmModal()">إلغاء</button>
                <button class="confirm-btn confirm" onclick="submitBet()">تأكيد</button>
            </div>
        </div>
    </div>

    <!-- الإشعارات -->
    <div class="toast" id="toast"></div>

    <!-- AOS -->
    <script src="https://unpkg.com/aos@2.3.1/dist/aos.js"></script>
    
    <script>
        AOS.init({
            duration: 800,
            once: true
        });

        // متغيرات عامة
        let currentUser = null;
        let allMatches = [];
        let userBets = [];
        let currentFilter = 'all';
        let selectedMatch = null;
        let selectedBetType = null;
        let selectedOdds = null;
        let selectedBetValue = null;
        let betAmount = 0;
        let potentialWin = 0;

        // تهيئة الصفحة
        document.addEventListener('DOMContentLoaded', async function() {
            await checkUser();
            await loadUserBalance();
            await loadMatches();
            await loadUserBets();
            await loadBettingStats();
        });

        // التحقق من المستخدم
        async function checkUser() {
            const savedUser = localStorage.getItem('current_user');
            if (!savedUser) {
                window.location.href = 'index.html';
                return;
            }
            currentUser = JSON.parse(savedUser);
            
            if (window.supabaseHelpers) {
                const result = await window.supabaseHelpers.getUserById(currentUser.id);
                if (result.success && result.data) {
                    currentUser = result.data;
                    localStorage.setItem('current_user', JSON.stringify(currentUser));
                }
            }
            
            document.getElementById('userAvatar').textContent = currentUser.name?.charAt(0).toUpperCase() || 'م';
        }

        // تحميل رصيد المستخدم
        async function loadUserBalance() {
            document.getElementById('balanceDisplay').innerHTML = `
                <i class="fas fa-wallet"></i>
                <span>${currentUser.balance || 0}$</span>
            `;
        }

        // تحميل المباريات
        async function loadMatches() {
            try {
                const result = await window.supabaseHelpers.getAllMatches();
                
                if (result.success && result.data) {
                    allMatches = result.data;
                    displayMatches();
                } else {
                    document.getElementById('matchesGrid').innerHTML = `
                        <div class="no-matches">
                            <i class="fas fa-futbol"></i>
                            <h3>لا توجد مباريات</h3>
                            <p>سيتم إضافة مباريات قريباً</p>
                        </div>
                    `;
                }
            } catch (error) {
                console.error('خطأ في تحميل المباريات:', error);
            }
        }

        // عرض المباريات حسب الفلتر
        function displayMatches() {
            const grid = document.getElementById('matchesGrid');
            const now = new Date().toISOString();
            
            let filteredMatches = allMatches;
            
            if (currentFilter === 'upcoming') {
                filteredMatches = allMatches.filter(m => 
                    m.status === 'upcoming' && m.match_date > now
                );
            } else if (currentFilter === 'live') {
                filteredMatches = allMatches.filter(m => m.status === 'live');
            } else if (currentFilter === 'finished') {
                filteredMatches = allMatches.filter(m => m.status === 'finished');
            }
            
            if (filteredMatches.length === 0) {
                grid.innerHTML = `
                    <div class="no-matches">
                        <i class="fas fa-futbol"></i>
                        <h3>لا توجد مباريات</h3>
                        <p>لا توجد مباريات في هذا التصنيف</p>
                    </div>
                `;
                return;
            }
            
            let html = '';
            filteredMatches.forEach(match => {
                const matchDate = new Date(match.match_date);
                const nowDate = new Date();
                const isLive = match.status === 'live';
                const isFinished = match.status === 'finished';
                const canBet = match.status === 'upcoming' && matchDate > nowDate;
                
                const team1Logo = match.team1_logo || match.team1?.charAt(0).toUpperCase() || 'A';
                const team2Logo = match.team2_logo || match.team2?.charAt(0).toUpperCase() || 'B';
                
                let timeHtml = '';
                if (isLive) {
                    timeHtml = `
                        <div class="match-time live">
                            <i class="fas fa-circle"></i> مباشر الآن
                        </div>
                    `;
                } else if (isFinished) {
                    timeHtml = `
                        <div class="match-time">
                            <i class="fas fa-check-circle"></i> انتهت
                        </div>
                    `;
                } else {
                    timeHtml = `
                        <div class="match-time">
                            <i class="far fa-calendar"></i> 
                            ${matchDate.toLocaleDateString('ar-SA')} - ${matchDate.toLocaleTimeString('ar-SA', {hour: '2-digit', minute:'2-digit'})}
                        </div>
                    `;
                }
                
                let resultHtml = '';
                if (isFinished && match.result_team1 !== null && match.result_team2 !== null) {
                    resultHtml = `
                        <div style="text-align: center; margin: 15px 0; padding: 10px; background: rgba(200,169,126,0.1); border-radius: 20px;">
                            <span style="color: var(--gold); font-weight: 700;">النتيجة: ${match.result_team1} - ${match.result_team2}</span>
                        </div>
                    `;
                }
                
                html += `
                    <div class="match-card ${isLive ? 'live' : ''}" data-aos="fade-up">
                        <span class="match-league">${match.league || 'دوري أبطال أوروبا'}</span>
                        
                        <div class="match-teams">
                            <div class="team">
                                <div class="team-logo">${team1Logo}</div>
                                <div class="team-name">${match.team1}</div>
                                ${isFinished ? `<div class="team-score">${match.result_team1 || 0}</div>` : ''}
                            </div>
                            <div class="match-vs">VS</div>
                            <div class="team">
                                <div class="team-logo">${team2Logo}</div>
                                <div class="team-name">${match.team2}</div>
                                ${isFinished ? `<div class="team-score">${match.result_team2 || 0}</div>` : ''}
                            </div>
                        </div>
                        
                        ${timeHtml}
                        ${resultHtml}
                        
                        ${canBet ? `
                            <div class="bet-options" id="bet-options-${match.id}">
                                <div class="bet-option" onclick="selectBetOption(${match.id}, '1', ${match.odds_1})">
                                    <div class="bet-value">${match.team1}</div>
                                    <div class="bet-odds">${match.odds_1}</div>
                                </div>
                                <div class="bet-option" onclick="selectBetOption(${match.id}, 'X', ${match.odds_x})">
                                    <div class="bet-value">تعادل</div>
                                    <div class="bet-odds">${match.odds_x}</div>
                                </div>
                                <div class="bet-option" onclick="selectBetOption(${match.id}, '2', ${match.odds_2})">
                                    <div class="bet-value">${match.team2}</div>
                                    <div class="bet-odds">${match.odds_2}</div>
                                </div>
                            </div>
                            
                            <div class="exact-score-section" style="display: none;" id="exact-${match.id}">
                                <div class="exact-score-title">
                                    <i class="fas fa-bullseye"></i> توقع النتيجة الدقيقة (ربح مضاعف)
                                </div>
                                <div class="exact-score-inputs">
                                    <input type="number" class="score-input" id="score1-${match.id}" min="0" max="10" placeholder="0">
                                    <span class="score-separator">-</span>
                                    <input type="number" class="score-input" id="score2-${match.id}" min="0" max="10" placeholder="0">
                                </div>
                                <div style="margin-top: 10px; font-size: 13px; color: var(--gold);">
                                    <i class="fas fa-star"></i> النتيجة الدقيقة: مضاعف x${match.max_bet_multiplier || 8}
                                </div>
                            </div>
                            
                            <div class="bet-amount-section" id="bet-amount-${match.id}" style="display: none;">
                                <div class="bet-amount-label">
                                    <span>💰 مبلغ الرهان</span>
                                    <span>الرصيد: ${currentUser.balance || 0}$</span>
                                </div>
                                <input type="number" class="bet-amount-input" id="amount-${match.id}" placeholder="أدخل المبلغ" min="10" max="${currentUser.balance || 0}" step="5">
                                
                                <div class="quick-amounts">
                                    <span class="quick-amount" onclick="setQuickAmount(${match.id}, 10)">10$</span>
                                    <span class="quick-amount" onclick="setQuickAmount(${match.id}, 25)">25$</span>
                                    <span class="quick-amount" onclick="setQuickAmount(${match.id}, 50)">50$</span>
                                    <span class="quick-amount" onclick="setQuickAmount(${match.id}, 100)">100$</span>
                                    <span class="quick-amount" onclick="setQuickAmount(${match.id}, 250)">250$</span>
                                    <span class="quick-amount" onclick="setQuickAmount(${match.id}, 500)">500$</span>
                                </div>
                                
                                <div class="potential-win" id="potential-${match.id}">
                                    <div class="potential-win-label">الربح المحتمل</div>
                                    <div class="potential-win-value">0$</div>
                                </div>
                                
                                <button class="place-bet-btn" onclick="openConfirmModal(${match.id})">
                                    <i class="fas fa-check-circle"></i> تأكيد الرهان
                                </button>
                            </div>
                        ` : ''}
                        
                        ${!canBet && !isLive && !isFinished ? `
                            <div style="text-align: center; padding: 15px; background: rgba(231,76,60,0.1); border-radius: 20px; color: var(--danger);">
                                <i class="fas fa-clock"></i> انتهى وقت المراهنة
                            </div>
                        ` : ''}
                    </div>
                `;
            });
            
            grid.innerHTML = html;
        }

        // فلترة المباريات
        function filterMatches(filter) {
            currentFilter = filter;
            document.querySelectorAll('.filter-btn').forEach(btn => btn.classList.remove('active'));
            event.currentTarget.classList.add('active');
            displayMatches();
        }

        // اختيار خيار الرهان
        function selectBetOption(matchId, type, odds) {
            // إزالة التحديد السابق
            document.querySelectorAll(`#bet-options-${matchId} .bet-option`).forEach(opt => {
                opt.classList.remove('selected');
            });
            
            // تحديد الخيار الجديد
            event.currentTarget.classList.add('selected');
            
            // حفظ البيانات
            selectedMatch = allMatches.find(m => m.id == matchId);
            selectedBetType = 'simple';
            selectedBetValue = type;
            selectedOdds = odds;
            
            // إظهار قسم المبلغ
            document.getElementById(`exact-${matchId}`).style.display = 'block';
            document.getElementById(`bet-amount-${matchId}`).style.display = 'block';
            
            // ربط حدث تغيير المبلغ
            const amountInput = document.getElementById(`amount-${matchId}`);
            amountInput.oninput = function() {
                updatePotentialWin(matchId);
            };
        }

        // تحديث الربح المحتمل
        function updatePotentialWin(matchId) {
            const amount = parseFloat(document.getElementById(`amount-${matchId}`).value) || 0;
            const score1 = parseInt(document.getElementById(`score1-${matchId}`)?.value) || 0;
            const score2 = parseInt(document.getElementById(`score2-${matchId}`)?.value) || 0;
            
            let odds = selectedOdds;
            let betType = 'simple';
            let betValue = selectedBetValue;
            
            // إذا كانت نتيجة دقيقة محددة
            if (score1 > 0 || score2 > 0) {
                const match = allMatches.find(m => m.id == matchId);
                odds = match.max_bet_multiplier || 8;
                betType = 'exact';
                betValue = `${score1}-${score2}`;
            }
            
            const win = amount * odds;
            document.querySelector(`#potential-${matchId} .potential-win-value`).textContent = win.toFixed(2) + '$';
            
            // حفظ البيانات للتأكيد
            betAmount = amount;
            potentialWin = win;
        }

        // تعيين مبلغ سريع
        function setQuickAmount(matchId, amount) {
            document.getElementById(`amount-${matchId}`).value = amount;
            updatePotentialWin(matchId);
        }

        // فتح نافذة تأكيد الرهان
        function openConfirmModal(matchId) {
            const amount = parseFloat(document.getElementById(`amount-${matchId}`).value);
            const score1 = parseInt(document.getElementById(`score1-${matchId}`)?.value) || 0;
            const score2 = parseInt(document.getElementById(`score2-${matchId}`)?.value) || 0;
            
            if (!amount || amount < 10) {
                showToast('❌ الحد الأدنى للرهان 10$', 'error');
                return;
            }
            
            if (amount > currentUser.balance) {
                showToast('❌ رصيدك غير كافي', 'error');
                return;
            }
            
            let betType = 'simple';
            let betValue = selectedBetValue;
            let odds = selectedOdds;
            
            if (score1 > 0 || score2 > 0) {
                betType = 'exact';
                betValue = `${score1}-${score2}`;
                odds = selectedMatch.max_bet_multiplier || 8;
            }
            
            const win = amount * odds;
            
            let betText = '';
            if (betValue === '1') betText = selectedMatch.team1;
            else if (betValue === 'X') betText = 'تعادل';
            else if (betValue === '2') betText = selectedMatch.team2;
            else betText = `نتيجة دقيقة ${betValue}`;
            
            document.getElementById('confirmDetails').innerHTML = `
                <div class="confirm-row">
                    <span class="confirm-label">المباراة:</span>
                    <span class="confirm-value">${selectedMatch.team1} vs ${selectedMatch.team2}</span>
                </div>
                <div class="confirm-row">
                    <span class="confirm-label">توقعك:</span>
                    <span class="confirm-value">${betText}</span>
                </div>
                <div class="confirm-row">
                    <span class="confirm-label">مضاعف الربح:</span>
                    <span class="confirm-value">x${odds}</span>
                </div>
                <div class="confirm-row">
                    <span class="confirm-label">مبلغ الرهان:</span>
                    <span class="confirm-value">${amount}$</span>
                </div>
                <div class="confirm-row">
                    <span class="confirm-label">الربح المحتمل:</span>
                    <span class="confirm-value win">${win.toFixed(2)}$</span>
                </div>
            `;
            
            // حفظ بيانات الرهان
            window.currentBetData = {
                matchId: matchId,
                betType: betType,
                betValue: betValue,
                amount: amount,
                odds: odds,
                win: win
            };
            
            document.getElementById('confirmModal').classList.add('active');
        }

        // إغلاق نافذة التأكيد
        function closeConfirmModal() {
            document.getElementById('confirmModal').classList.remove('active');
        }

        // تقديم الرهان
        async function submitBet() {
            const betData = window.currentBetData;
            if (!betData) return;
            
            const result = await window.supabaseHelpers.placeBet({
                userId: currentUser.id,
                matchId: betData.matchId,
                betType: betData.betType,
                betValue: betData.betValue,
                amount: betData.amount,
                odds: betData.odds
            });
            
            if (result.success) {
                closeConfirmModal();
                showToast('✅ تم تقديم الرهان بنجاح');
                
                // تحديث البيانات
                await checkUser();
                await loadUserBalance();
                await loadUserBets();
                await loadMatches();
                await loadBettingStats();
                
                // إعادة تعيين التحديد
                selectedMatch = null;
                selectedBetType = null;
                selectedBetValue = null;
                betAmount = 0;
                potentialWin = 0;
            } else {
                showToast('❌ ' + result.error, 'error');
            }
        }

        // تحميل رهانات المستخدم
        async function loadUserBets() {
            try {
                const result = await window.supabaseHelpers.getUserBets(currentUser.id);
                
                if (result.success && result.data) {
                    userBets = result.data;
                    displayUserBets();
                    updateUserBetStats();
                }
            } catch (error) {
                console.error('خطأ في تحميل الرهانات:', error);
            }
        }

        // عرض رهانات المستخدم
        function displayUserBets() {
            const container = document.getElementById('betsHistory');
            
            if (!userBets || userBets.length === 0) {
                container.innerHTML = `
                    <div style="text-align: center; color: var(--text-muted); padding: 40px;">
                        <i class="fas fa-ticket-alt fa-3x" style="opacity: 0.3; margin-bottom: 15px;"></i>
                        <p>لا توجد رهانات سابقة</p>
                    </div>
                `;
                return;
            }
            
            let html = '';
            userBets.slice(0, 20).forEach(bet => {
                const match = bet.matches;
                if (!match) return;
                
                const date = new Date(bet.created_at).toLocaleDateString('ar-SA');
                
                let betText = '';
                if (bet.bet_value === '1') betText = match.team1;
                else if (bet.bet_value === 'X') betText = 'تعادل';
                else if (bet.bet_value === '2') betText = match.team2;
                else betText = `نتيجة ${bet.bet_value}`;
                
                let statusClass = 'pending';
                let statusText = 'قيد الانتظار';
                
                if (bet.status === 'won') {
                    statusClass = 'won';
                    statusText = 'فائز';
                } else if (bet.status === 'lost') {
                    statusClass = 'lost';
                    statusText = 'خاسر';
                } else if (bet.status === 'refunded') {
                    statusClass = 'pending';
                    statusText = 'ملغي';
                }
                
                const canCancel = bet.status === 'pending' && match.status === 'upcoming' && new Date(match.match_date) > new Date();
                
                html += `
                    <div class="history-item ${statusClass}">
                        <div class="history-icon">
                            <i class="fas ${bet.status === 'won' ? 'fa-trophy' : bet.status === 'lost' ? 'fa-times' : 'fa-clock'}"></i>
                        </div>
                        <div class="history-content">
                            <div class="history-match">${match.team1} vs ${match.team2}</div>
                            <div class="history-details">
                                <span><i class="fas fa-tag"></i> ${betText}</span>
                                <span><i class="fas fa-percent"></i> x${bet.odds}</span>
                                <span><i class="fas fa-dollar-sign"></i> ${bet.amount}$</span>
                                <span class="history-amount">${bet.status === 'won' ? '+' + bet.paid_amount + '$' : ''}</span>
                                <span class="history-status">${statusText}</span>
                            </div>
                            <div style="font-size: 11px; color: var(--text-muted); margin-top: 5px;">
                                <i class="far fa-calendar"></i> ${date}
                            </div>
                        </div>
                        ${canCancel ? `
                            <button class="history-cancel" onclick="cancelBet(${bet.id})">
                                <i class="fas fa-times"></i> إلغاء
                            </button>
                        ` : ''}
                    </div>
                `;
            });
            
            container.innerHTML = html;
        }

        // تحديث إحصائيات رهانات المستخدم
        function updateUserBetStats() {
            const totalBets = userBets.length;
            const totalAmount = userBets.reduce((sum, b) => sum + b.amount, 0);
            const totalWon = userBets.filter(b => b.status === 'won').reduce((sum, b) => sum + (b.paid_amount || 0), 0);
            const netProfit = totalWon - totalAmount;
            
            document.getElementById('myBetsCount').textContent = totalBets;
            document.getElementById('myTotalBets').textContent = totalAmount.toFixed(2) + '$';
            document.getElementById('myWinnings').textContent = totalWon.toFixed(2) + '$';
            document.getElementById('myNetProfit').textContent = netProfit.toFixed(2) + '$';
            
            if (netProfit > 0) {
                document.getElementById('myNetProfit').style.color = 'var(--success)';
            } else if (netProfit < 0) {
                document.getElementById('myNetProfit').style.color = 'var(--danger)';
            }
        }

        // إلغاء رهان
        async function cancelBet(betId) {
            if (!confirm('هل تريد إلغاء هذا الرهان؟')) return;
            
            const result = await window.supabaseHelpers.cancelBet(betId, currentUser.id);
            
            if (result.success) {
                showToast('✅ تم إلغاء الرهان واسترداد المبلغ');
                await checkUser();
                await loadUserBalance();
                await loadUserBets();
                await loadMatches();
            } else {
                showToast('❌ ' + result.error, 'error');
            }
        }

        // تحميل إحصائيات المراهنات
        async function loadBettingStats() {
            try {
                const result = await window.supabaseHelpers.getBettingStats();
                // يمكن استخدامها لعرض إحصائيات عامة إذا أردت
            } catch (error) {
                console.error(error);
            }
        }

        // تبديل قائمة المستخدم
        function toggleUserMenu() {
            document.getElementById('userDropdown').classList.toggle('active');
        }

        // تسجيل الخروج
        function logout() {
            if (confirm('هل تريد تسجيل الخروج؟')) {
                localStorage.removeItem('current_user');
                window.location.href = 'index.html';
            }
        }

        // إظهار الإشعار
        function showToast(message, type = 'success') {
            const toast = document.getElementById('toast');
            toast.textContent = message;
            toast.className = 'toast ' + type;
            toast.style.display = 'block';
            setTimeout(() => toast.style.display = 'none', 3000);
        }

        // إغلاق القائمة عند النقر خارجها
        document.addEventListener('click', function(e) {
            const dropdown = document.getElementById('userDropdown');
            const avatar = document.getElementById('userAvatar');
            if (dropdown && avatar && !avatar.contains(e.target) && !dropdown.contains(e.target)) {
                dropdown.classList.remove('active');
            }
        });

        // تحديث عند العودة للصفحة
        window.addEventListener('pageshow', function(event) {
            if (event.persisted) {
                window.location.reload();
            }
        });
    </script>
</body>
</html>
